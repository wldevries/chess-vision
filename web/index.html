<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>chess-vision · photo → FEN</title>
    <style>
      :root { color-scheme: light dark; --gap: 12px; --line: #8888; }
      body { font-family: system-ui, sans-serif; margin: 0 auto; padding: var(--gap); max-width: 820px; }
      h1 { font-size: 1.1rem; margin: 0 0 var(--gap); }
      .row { display: flex; gap: var(--gap); flex-wrap: wrap; align-items: center; margin-bottom: var(--gap); }
      button, label.file { padding: 8px 12px; border: 1px solid #888; border-radius: 8px; cursor: pointer; background: transparent; color: inherit; font: inherit; }
      button:disabled { opacity: 0.45; cursor: default; }
      #stage { position: relative; width: 100%; background: #0002; border-radius: 8px; overflow: hidden; }
      #cam { width: 100%; height: auto; display: block; }
      #overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
      input[type="file"] { display: none; }
      .panel { display: grid; grid-template-columns: auto 1fr; gap: var(--gap); align-items: start; margin-top: var(--gap); }
      #board { display: grid; grid-template-columns: repeat(8, 1fr); width: min(320px, 78vw); aspect-ratio: 1; border: 1px solid #888; border-radius: 4px; overflow: hidden; user-select: none; }
      #board .sq { position: relative; display: flex; align-items: center; justify-content: center; aspect-ratio: 1; font-size: 1.8rem; line-height: 1; font-family: "Segoe UI Symbol", "Noto Sans Symbols2", serif; }
      #board .coord { position: absolute; font-size: 0.62rem; line-height: 1; font-family: system-ui, sans-serif; font-weight: 600; text-shadow: none; pointer-events: none; }
      #board .coord.rank { left: 2px; top: 1px; }
      #board .coord.file { right: 2px; bottom: 1px; }
      #board .sq.light { background: #eccfa5; }
      #board .sq.dark { background: #b58863; }
      #board .sq.w { color: #fafafa; text-shadow: 0 0 2px #000, 0 0 2px #000; }
      #board .sq.b { color: #111; text-shadow: 0 0 2px #fff; }
      .meta { display: flex; flex-direction: column; gap: 8px; }
      #fen { font-family: ui-monospace, monospace; font-size: 0.9rem; word-break: break-all; padding: 8px; border: 1px dashed var(--line); border-radius: 8px; }
      .orient { font-size: 0.9rem; opacity: 0.85; }
      a.lichess { align-self: start; }
      #status { font-size: 0.83rem; opacity: 0.8; white-space: pre-wrap; margin-top: var(--gap); }
    </style>
  </head>
  <body>
    <h1>chess-vision — webcam → FEN</h1>

    <div class="row">
      <button id="start">▶ Start camera</button>
      <button id="snap" disabled>📸 Snap &amp; read</button>
      <button id="resume" disabled>↺ Live</button>
      <label class="file">🖼 File…<input id="file" type="file" accept="image/*" /></label>
      <label>Backend
        <select id="backend">
          <option value="webgpu" selected>WebGPU</option>
          <option value="webnn-gpu">WebNN · GPU</option>
          <option value="webnn-npu">WebNN · NPU</option>
          <option value="wasm">WASM (CPU)</option>
        </select>
      </label>
    </div>

    <div id="stage">
      <video id="cam" playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <div class="panel">
      <div id="board" aria-label="board state"></div>
      <div class="meta">
        <div class="orient">
          Orientation: <b id="orient">0</b>/3
          <button id="rotate" disabled>Rotate ⟳</button>
          <div style="opacity:.7">(rotate until a8 is bottom-left for White)</div>
        </div>
        <div id="fen">—</div>
        <a class="lichess" id="lichess" href="#" target="_blank" rel="noopener">Open in lichess ↗</a>
      </div>
    </div>

    <div id="status">loading models…</div>

    <!-- onnxruntime-web 1.26 JSEP bundle = WebGPU + WebNN EPs (falls back to WASM). ES module app.js. -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.26.0/dist/ort.webgpu.min.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
