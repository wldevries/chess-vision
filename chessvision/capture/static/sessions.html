<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>chessvision — session metadata</title>
<style>
  :root {
    --bg: #15171c; --panel: #1f232b; --line: #2c313b; --fg: #e7e9ee;
    --muted: #9aa3b2; --accent: #4f8cff; --good: #36c46b; --bad: #ff5d5d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--fg); font: 16px/1.4 system-ui, sans-serif;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--line); background: var(--panel); }
  header .title { font-weight: 700; }
  a.backlink { color: var(--muted); text-decoration: none; padding: 8px 10px; border-radius: 8px; }
  a.backlink:hover { background: #262b34; color: var(--fg); }
  select, button, input {
    font: inherit; color: var(--fg); background: #262b34; border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 14px;
  }
  button { cursor: pointer; }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--accent); border-color: var(--accent); font-weight: 700; }
  .muted { color: var(--muted); font-size: 14px; }

  .body { flex: 1; min-height: 0; display: grid; grid-template-columns: 340px 1fr; }
  .list { overflow-y: auto; border-right: 1px solid var(--line); padding: 8px; display: flex; flex-direction: column; gap: 6px; }
  .row { display: flex; gap: 10px; align-items: center; text-align: left; width: 100%; padding: 8px;
         background: #20262e; border: 1px solid var(--line); border-radius: 8px; color: var(--fg); cursor: pointer; }
  .row.active { border-color: var(--accent); }
  .row img { width: 56px; height: 42px; object-fit: cover; border-radius: 4px; background: #000; flex: 0 0 auto; }
  .row .mr-id { font-variant-numeric: tabular-nums; font-size: 13px; }
  .row .mr-tags { color: var(--muted); font-size: 12px; }
  .row.untagged .mr-tags { color: #e0a030; }
  .detail { overflow-y: auto; padding: 16px; }
  .empty { color: var(--muted); display: grid; place-items: center; height: 100%; }
  .preview { position: relative; background: #000; border-radius: 8px; display: grid; place-items: center; min-height: 200px; }
  .preview img { max-width: 100%; max-height: 52vh; object-fit: contain; display: block; }
  .preview .nav { position: absolute; top: 50%; transform: translateY(-50%); background: #000a;
                  border: 1px solid var(--line); color: #fff; border-radius: 8px; padding: 10px 14px; font-size: 18px; cursor: pointer; }
  .preview .prev { left: 10px; } .preview .next { right: 10px; }
  .preview .count { position: absolute; bottom: 8px; right: 10px; background: #000a; padding: 2px 8px;
                    border-radius: 6px; font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .fields { display: grid; grid-template-columns: 92px 1fr; gap: 10px 12px; align-items: center; margin: 16px 0; max-width: 520px; }
  .fields label { color: var(--muted); }
  .fields input, .fields select { width: 100%; max-width: none; }
  .actions { display: flex; gap: 10px; align-items: center; max-width: 520px; }

  .toast { position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%);
           background: #000a; border: 1px solid var(--line); padding: 10px 16px; border-radius: 10px;
           opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 30; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <header>
    <span class="title">♟ Session metadata</span>
    <a class="backlink" href="/" title="Back to menu">☰ menu</a>
    <span class="muted">Tag past capture sessions with set / board / camera / surface.</span>
  </header>

  <div class="body">
    <div class="list" id="list"></div>
    <div class="detail" id="detail"><div class="empty">Select a session to tag.</div></div>
  </div>

  <datalist id="deviceOptions"></datalist>
  <datalist id="surfaceOptions"></datalist>
  <div class="toast" id="toast"></div>

<script src="/static/cv.js"></script>
<script>
// Master-detail editor over /api/sessions: pick a session, page its photos, set the
// set/board/camera/surface tags that drive the train/val split. Helpers from cv.js.
let options = { sets: [], boards: [] };
let sessions = [];
let current = null;
let imgIdx = 0;

async function load() {
  $("list").innerHTML = '<div class="empty">Loading…</div>';
  try {
    const [opts, sess] = await Promise.all([fetch("/api/meta").then(j), fetch("/api/sessions").then(j)]);
    options = opts; sessions = sess;
  } catch (e) { $("list").innerHTML = `<div class="empty">Load failed: ${e.message}</div>`; return; }
  refreshDatalists();
  current = sessions.length ? sessions[0].session_id : null;
  imgIdx = 0;
  renderList(); renderDetail();
}
function fillDatalist(id, values) {
  const dl = $(id); dl.innerHTML = "";
  [...values].sort().forEach((v) => { const o = document.createElement("option"); o.value = v; dl.appendChild(o); });
}
function refreshDatalists() {
  fillDatalist("deviceOptions", new Set(sessions.map((s) => s.device).filter(Boolean)));
  fillDatalist("surfaceOptions", new Set(sessions.map((s) => s.surface).filter(Boolean)));
}
function renderList() {
  const list = $("list");
  list.innerHTML = "";
  if (!sessions.length) { list.innerHTML = '<div class="empty">No capture sessions on disk.</div>'; return; }
  sessions.forEach((s) => {
    const row = document.createElement("button");
    row.className = "row" + (s.session_id === current ? " active" : "") + (s.board ? "" : " untagged");
    if (s.images.length) {
      const t = document.createElement("img");
      t.src = `/api/store/image?path=${encodeURIComponent(s.images[0])}&w=240`; t.alt = ""; t.loading = "lazy";
      row.appendChild(t);
    }
    const col = document.createElement("span");
    const id = document.createElement("span"); id.className = "mr-id"; id.textContent = `${s.session_id} (${s.n_captures})`;
    const tags = document.createElement("span"); tags.className = "mr-tags";
    tags.textContent = [s.board, s.set, s.device].filter(Boolean).join(" · ") || "untagged";
    col.append(id, document.createElement("br"), tags);
    row.appendChild(col);
    row.onclick = () => { current = s.session_id; imgIdx = 0; renderList(); renderDetail(); };
    list.appendChild(row);
  });
}
function fillSelect(sel, values, cur) {
  sel.innerHTML = "";
  const blank = document.createElement("option"); blank.value = ""; blank.textContent = "—"; sel.appendChild(blank);
  values.forEach((v) => { const o = document.createElement("option"); o.value = v; o.textContent = v; sel.appendChild(o); });
  sel.value = cur || "";
}
function renderDetail() {
  const detail = $("detail");
  const s = sessions.find((x) => x.session_id === current);
  if (!s) { detail.innerHTML = '<div class="empty">Select a session to tag.</div>'; return; }
  detail.innerHTML =
    '<div class="preview" id="preview"></div>' +
    '<div class="fields">' +
    '<label>Set</label><select id="mSet"></select>' +
    '<label>Board</label><select id="mBoard"></select>' +
    '<label>Camera</label><input id="mDevice" list="deviceOptions" placeholder="e.g. Surface Camera Rear" />' +
    '<label>Surface</label><input id="mSurface" list="surfaceOptions" placeholder="e.g. marble" />' +
    '</div><div class="actions"><button class="primary" id="mSave">Save</button><span class="muted" id="mStatus"></span></div>';
  fillSelect($("mSet"), options.sets, s.set);
  fillSelect($("mBoard"), options.boards, s.board);
  $("mDevice").value = s.device || "";
  $("mSurface").value = s.surface || "";
  $("mStatus").textContent = `${s.n_captures} photo(s)`;
  $("mSave").onclick = () => save().catch((e) => toast(e.message));
  renderPreview();
}
function renderPreview() {
  const wrap = $("preview");
  const s = sessions.find((x) => x.session_id === current);
  if (!s || !s.images.length) { wrap.innerHTML = '<div class="empty">No photos in this session.</div>'; return; }
  imgIdx = (imgIdx + s.images.length) % s.images.length;
  wrap.innerHTML = "";
  const img = document.createElement("img");
  img.src = `/api/store/image?path=${encodeURIComponent(s.images[imgIdx])}&w=900`; img.alt = "";
  wrap.appendChild(img);
  if (s.images.length > 1) {
    const nav = (cls, txt, step) => {
      const b = document.createElement("button"); b.className = `nav ${cls}`; b.textContent = txt;
      b.onclick = () => { imgIdx += step; renderPreview(); };
      wrap.appendChild(b);
    };
    nav("prev", "‹", -1); nav("next", "›", 1);
    const c = document.createElement("span"); c.className = "count";
    c.textContent = `${imgIdx + 1} / ${s.images.length}`; wrap.appendChild(c);
  }
}
async function save() {
  const sid = current;
  const updated = await postJson(`/api/sessions/${sid}/meta`, {
    set: $("mSet").value, board: $("mBoard").value,
    device: $("mDevice").value.trim(), surface: $("mSurface").value.trim(),
  });
  const s = sessions.find((x) => x.session_id === sid);
  if (s) Object.assign(s, { set: updated.set, board: updated.board, device: updated.device, surface: updated.surface });
  refreshDatalists();
  renderList();
  $("mStatus").textContent = "Saved ✓";
  toast("Tagged " + sid);
}

load();
</script>
</body>
</html>
