<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Capture corner review</title>
<style>
  :root { --bg:#11141a; --panel:#1a1f2b; --muted:#8a93a6; --accent:#4f8cff; --model:#3ad17a; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px system-ui,sans-serif; background:var(--bg); color:#e7ecf3; height:100vh; display:flex; flex-direction:column; }
  header { display:flex; gap:12px; align-items:center; padding:10px 14px; background:var(--panel); border-bottom:1px solid #000; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; font-weight:700; }
  button { background:#26304a; color:#e7ecf3; border:0; border-radius:6px; padding:7px 12px; cursor:pointer; font:inherit; }
  button:hover:not(:disabled) { background:#33405f; }
  button:disabled { opacity:.4; cursor:default; }
  .spacer { flex:1; }
  .muted { color:var(--muted); }
  label.chk { display:flex; align-items:center; gap:6px; cursor:pointer; }
  .swatch { display:inline-block; width:12px; height:12px; border-radius:2px; vertical-align:middle; }
  #stage { flex:1; position:relative; min-height:0; background:#0b0d12; }
  canvas { position:absolute; inset:0; width:100%; height:100%; }
  #info { padding:8px 14px; background:var(--panel); border-top:1px solid #000; display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
  input#jump { width:70px; background:#0b0d12; color:#e7ecf3; border:1px solid #2a3550; border-radius:6px; padding:5px; }
  .tag { padding:2px 8px; border-radius:10px; background:#26304a; font-size:12px; }
  .warn { background:#5a2330; color:#ffb4b4; }
</style>
</head>
<body>
<header>
  <h1>Capture corner review</h1>
  <span class="muted">read-only · current grid vs model</span>
  <div class="spacer"></div>
  <label class="chk"><input type="checkbox" id="showLabel" checked> <span class="swatch" style="background:var(--accent)"></span> labelled grid</label>
  <label class="chk"><input type="checkbox" id="showModel" checked> <span class="swatch" style="background:var(--model)"></span> model grid</label>
</header>
<div id="stage"><canvas id="cv"></canvas></div>
<div id="info">
  <button id="prev">◀ Prev</button>
  <button id="next">Next ▶</button>
  <span><input id="jump" type="number" min="1"> / <span id="total">—</span></span>
  <span id="meta" class="muted">loading…</span>
  <span id="disagree"></span>
</div>

<script>
const $ = (id) => document.getElementById(id);
async function j(r){ const d = await r.json(); if(!r.ok) throw new Error(d.error||r.statusText); return d; }

// ---- grid math (mirrors the capture app's squareToQuad/projectH) ----
function orderCorners(pts){
  const s=[...pts].sort((a,b)=>a[1]-b[1]);
  const [tl,tr]=s.slice(0,2).sort((a,b)=>a[0]-b[0]);
  const [bl,br]=s.slice(2,4).sort((a,b)=>a[0]-b[0]);
  return {tl,tr,br,bl};
}
function squareToQuad(tl,tr,br,bl){
  const [x0,y0]=tl,[x1,y1]=tr,[x2,y2]=br,[x3,y3]=bl;
  const dx1=x1-x2,dx2=x3-x2,sx=x0-x1+x2-x3, dy1=y1-y2,dy2=y3-y2,sy=y0-y1+y2-y3;
  if(Math.abs(sx)<1e-9&&Math.abs(sy)<1e-9) return {a:x1-x0,b:x3-x0,c:x0,d:y1-y0,e:y3-y0,f:y0,g:0,h:0};
  const den=dx1*dy2-dx2*dy1, g=(sx*dy2-dx2*sy)/den, h=(dx1*sy-sx*dy1)/den;
  return {a:x1-x0+g*x1,b:x3-x0+h*x3,c:x0,d:y1-y0+g*y1,e:y3-y0+h*y3,f:y0,g,h};
}
const projectH=(H,u,v)=>{const w=H.g*u+H.h*v+1; return [(H.a*u+H.b*v+H.c)/w,(H.d*u+H.e*v+H.f)/w];};

function containRect(vw,vh,cw,ch){ const s=Math.min(cw/vw,ch/vh); return {scale:s, offx:(cw-vw*s)/2, offy:(ch-vh*s)/2}; }
const toDisp=(x,y,r)=>[r.offx+x*r.scale, r.offy+y*r.scale];

function drawGrid(ctx, corners, r, color){
  if(!corners) return;
  const o=orderCorners(Object.values(corners));
  const H=squareToQuad(o.tl,o.tr,o.br,o.bl);
  const seg=(p,q)=>{const A=toDisp(p[0],p[1],r),B=toDisp(q[0],q[1],r);ctx.beginPath();ctx.moveTo(A[0],A[1]);ctx.lineTo(B[0],B[1]);ctx.stroke();};
  for(let k=0;k<=8;k++){
    const t=k/8;
    const f0=projectH(H,t,0),f1=projectH(H,t,1),r0=projectH(H,0,t),r1=projectH(H,1,t);
    ctx.lineWidth=3; ctx.strokeStyle="rgba(0,0,0,0.35)"; seg(f0,f1); seg(r0,r1);
    ctx.lineWidth=k%8===0?2.5:1.4; ctx.strokeStyle=color; seg(f0,f1); seg(r0,r1);
  }
  ctx.fillStyle=color;
  for(const [x,y] of [o.tl,o.tr,o.br,o.bl]){ const [dx,dy]=toDisp(x,y,r); ctx.beginPath(); ctx.arc(dx,dy,5,0,7); ctx.fill(); }
}

// ---- state ----
let frames=[], idx=0, cur=null, img=new Image();
const CSS=getComputedStyle(document.documentElement);
const C_LABEL=CSS.getPropertyValue("--accent").trim(), C_MODEL=CSS.getPropertyValue("--model").trim();

function maxDisagree(a,b){
  if(!a||!b) return null;
  const oa=orderCorners(Object.values(a)), ob=orderCorners(Object.values(b));
  return Math.max(...["tl","tr","br","bl"].map(k=>Math.hypot(oa[k][0]-ob[k][0], oa[k][1]-ob[k][1])));
}

function redraw(){
  const cv=$("cv"), r0=cv.getBoundingClientRect();
  cv.width=r0.width; cv.height=r0.height;
  const ctx=cv.getContext("2d");
  ctx.clearRect(0,0,cv.width,cv.height);
  if(!cur||!img.complete||!img.naturalWidth) return;
  const r=containRect(cur.width,cur.height,cv.width,cv.height);
  ctx.drawImage(img, r.offx, r.offy, cur.width*r.scale, cur.height*r.scale);
  if($("showLabel").checked) drawGrid(ctx, cur.original, r, C_LABEL);
  if($("showModel").checked) drawGrid(ctx, cur.model, r, C_MODEL);
}

async function show(i){
  if(!frames.length) return;
  idx=(i+frames.length)%frames.length;
  const f=frames[idx];
  $("jump").value=idx+1;
  $("meta").textContent=`${f.session} / ${f.name}`;
  $("disagree").textContent="";
  cur=null; redraw();
  cur=await j(await fetch(`/api/capture-corners/frame/${f.task_id}`));
  const d=maxDisagree(cur.original, cur.model);
  const frac = d!=null ? d/Math.max(cur.width,cur.height) : null;
  $("disagree").innerHTML = frac==null ? "" :
    `<span class="tag ${frac>0.02?'warn':''}">model Δ ${d.toFixed(0)}px (${(frac*100).toFixed(1)}%)</span>`;
  if(!cur.original || Object.keys(cur.original).length<4)
    $("meta").innerHTML += ' <span class="tag warn">no labelled corners</span>';
  img=new Image();
  img.onload=redraw; img.onerror=redraw;
  img.src=cur.image_url;
}

$("prev").onclick=()=>show(idx-1);
$("next").onclick=()=>show(idx+1);
$("jump").onchange=()=>show((parseInt($("jump").value,10)||1)-1);
$("showLabel").onchange=redraw; $("showModel").onchange=redraw;
window.addEventListener("keydown",(e)=>{ if(e.key==="ArrowLeft")show(idx-1); else if(e.key==="ArrowRight")show(idx+1); });
window.addEventListener("resize", redraw);

(async function init(){
  try{
    frames=await j(await fetch("/api/capture-corners/list"));
    $("total").textContent=frames.length;
    $("jump").max=frames.length;
    if(frames.length) await show(0); else $("meta").textContent="no capture frames found";
  }catch(e){ $("meta").textContent="error: "+e.message; }
})();
</script>
</body>
</html>
