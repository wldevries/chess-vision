<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Capture corner review</title>
<style>
  :root { --bg:#11141a; --panel:#1a1f2b; --muted:#8a93a6; --accent:#4f8cff; --model:#3ad17a; --edit:#ffb44f; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px system-ui,sans-serif; background:var(--bg); color:#e7ecf3; height:100vh; display:flex; flex-direction:column; }
  header { display:flex; gap:10px; align-items:center; padding:10px 14px; background:var(--panel); border-bottom:1px solid #000; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; font-weight:700; }
  button { background:#26304a; color:#e7ecf3; border:0; border-radius:6px; padding:7px 12px; cursor:pointer; font:inherit; }
  button:hover:not(:disabled) { background:#33405f; }
  button:disabled { opacity:.4; cursor:default; }
  button.primary { background:var(--accent); color:#0b0d12; font-weight:700; }
  button.primary.dirty { background:var(--edit); }
  .spacer { flex:1; }
  .muted { color:var(--muted); }
  label.chk { display:flex; align-items:center; gap:6px; cursor:pointer; }
  .swatch { display:inline-block; width:12px; height:12px; border-radius:2px; vertical-align:middle; }
  #stage { flex:1; position:relative; min-height:0; background:#0b0d12; }
  canvas { position:absolute; inset:0; width:100%; height:100%; touch-action:none; cursor:crosshair; }
  #info { padding:8px 14px; background:var(--panel); border-top:1px solid #000; display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  input#jump { width:66px; background:#0b0d12; color:#e7ecf3; border:1px solid #2a3550; border-radius:6px; padding:5px; }
  .tag { padding:2px 8px; border-radius:10px; background:#26304a; font-size:12px; }
  .warn { background:#5a2330; color:#ffb4b4; }
  .ok { background:#1f4733; color:#9be8c0; }
  .toast { position:fixed; left:50%; bottom:74px; transform:translateX(-50%); background:#26304a; padding:10px 16px; border-radius:8px; opacity:0; transition:opacity .2s; pointer-events:none; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<header>
  <h1>Capture corner review</h1>
  <button id="useModel" title="Snap the editable corners to the model's prediction">Use model</button>
  <button id="reset" title="Revert to the labelled corners">Reset</button>
  <div class="spacer"></div>
  <label class="chk"><input type="checkbox" id="showModel" checked> <span class="swatch" style="background:var(--model)"></span> model grid</label>
  <label class="chk"><input type="checkbox" id="showOrig"> <span class="swatch" style="background:var(--accent)"></span> original</label>
  <button id="save" class="primary" title="Save corners to Label Studio (S)">Save</button>
  <button id="sync" title="Force Label Studio to export its annotations to the chess-annotations bucket">Sync LS → bucket</button>
</header>
<div id="stage"><canvas id="cv"></canvas></div>
<div id="info">
  <button id="prev">◀ Prev</button>
  <button id="next">Next ▶</button>
  <label class="chk"><input type="checkbox" id="skipSeen" checked> skip seen</label>
  <span><input id="jump" type="number" min="1"> / <span id="total">—</span></span>
  <span id="meta" class="muted">loading…</span>
  <span id="disagree"></span>
  <span id="savedTag"></span>
  <div class="spacer"></div>
  <span id="seenCount" class="muted"></span>
  <button id="resetSeen" title="Forget which frames you've marked seen">Reset seen</button>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
async function j(r){ const d = await r.json(); if(!r.ok) throw new Error(d.error||r.statusText); return d; }
let toastT;
function toast(m){ const t=$("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2200); }

// ---- grid math (mirrors the capture app's squareToQuad/projectH) ----
function orderCorners(pts){
  const s=[...pts].sort((a,b)=>a[1]-b[1]);
  const [tl,tr]=s.slice(0,2).sort((a,b)=>a[0]-b[0]);
  const [bl,br]=s.slice(2,4).sort((a,b)=>a[0]-b[0]);
  return {tl,tr,br,bl};
}
function squareToQuad(tl,tr,br,bl){
  const [x0,y0]=tl,[x1,y1]=tr,[x2,y2]=br,[x3,y3]=bl;
  const dx1=x1-x2,dx2=x3-x2,sx=x0-x1+x2-x3, dy1=y1-y2,dy2=y3-y2,sy=y0-y1+y2-y3;
  if(Math.abs(sx)<1e-9&&Math.abs(sy)<1e-9) return {a:x1-x0,b:x3-x0,c:x0,d:y1-y0,e:y3-y0,f:y0,g:0,h:0};
  const den=dx1*dy2-dx2*dy1, g=(sx*dy2-dx2*sy)/den, h=(dx1*sy-sx*dy1)/den;
  return {a:x1-x0+g*x1,b:x3-x0+h*x3,c:x0,d:y1-y0+g*y1,e:y3-y0+h*y3,f:y0,g,h};
}
const projectH=(H,u,v)=>{const w=H.g*u+H.h*v+1; return [(H.a*u+H.b*v+H.c)/w,(H.d*u+H.e*v+H.f)/w];};
function containRect(vw,vh,cw,ch){ const s=Math.min(cw/vw,ch/vh); return {scale:s, offx:(cw-vw*s)/2, offy:(ch-vh*s)/2}; }
const toDisp=(x,y,r)=>[r.offx+x*r.scale, r.offy+y*r.scale];
const toNative=(x,y,r)=>[(x-r.offx)/r.scale, (y-r.offy)/r.scale];

function gridFromPts(ctx, pts, r, color, handles){
  if(!pts || pts.length<4) return;
  const o=orderCorners(pts);
  const H=squareToQuad(o.tl,o.tr,o.br,o.bl);
  const seg=(p,q)=>{const A=toDisp(p[0],p[1],r),B=toDisp(q[0],q[1],r);ctx.beginPath();ctx.moveTo(A[0],A[1]);ctx.lineTo(B[0],B[1]);ctx.stroke();};
  for(let k=0;k<=8;k++){
    const t=k/8, f0=projectH(H,t,0),f1=projectH(H,t,1),r0=projectH(H,0,t),r1=projectH(H,1,t);
    ctx.lineWidth=3; ctx.strokeStyle="rgba(0,0,0,0.35)"; seg(f0,f1); seg(r0,r1);
    ctx.lineWidth=k%8===0?2.5:1.3; ctx.strokeStyle=color; seg(f0,f1); seg(r0,r1);
  }
  ctx.fillStyle=color;
  for(const [x,y] of pts){ const [dx,dy]=toDisp(x,y,r); ctx.beginPath(); ctx.arc(dx,dy, handles?8:4, 0,7); ctx.fill(); }
}

// ---- state ----
let frames=[], idx=0, cur=null, img=new Image(), edit=[], dirty=false, lastRect=null, dragging=-1;
const CSS=getComputedStyle(document.documentElement);
const C_EDIT=CSS.getPropertyValue("--edit").trim(), C_MODEL=CSS.getPropertyValue("--model").trim(), C_ORIG=CSS.getPropertyValue("--accent").trim();

function maxDisagree(a,b){
  if(!a||!b) return null;
  const oa=orderCorners(a), ob=orderCorners(Object.values(b));
  return Math.max(...["tl","tr","br","bl"].map(k=>Math.hypot(oa[k][0]-ob[k][0], oa[k][1]-ob[k][1])));
}
function refreshSaveBtn(){ $("save").classList.toggle("dirty", dirty); $("save").textContent = dirty ? "Save *" : "Save"; }

// ---- "seen" persistence (per-browser) + dirty-nav guard ----
const SEEN_KEY="cc_seen_v1";
let seen=new Set(JSON.parse(localStorage.getItem(SEEN_KEY)||"[]"));
function persistSeen(){ localStorage.setItem(SEEN_KEY, JSON.stringify([...seen])); }
function updateSeenCount(){ if(frames.length) $("seenCount").textContent=`${seen.size}/${frames.length} seen`; }
function markSeen(id){ if(!seen.has(id)){ seen.add(id); persistSeen(); updateSeenCount(); } }
function guardDirty(){ return !dirty || confirm("Discard unsaved corner edits on this frame?"); }
function nextUnseen(from){ for(let s=1;s<=frames.length;s++){ const i=(from+s)%frames.length; if(!seen.has(frames[i].task_id)) return i; } return -1; }

function redraw(){
  const cv=$("cv"), box=cv.getBoundingClientRect();
  cv.width=box.width; cv.height=box.height;
  const ctx=cv.getContext("2d");
  ctx.clearRect(0,0,cv.width,cv.height);
  if(!cur||!img.complete||!img.naturalWidth) return;
  const r=containRect(cur.width,cur.height,cv.width,cv.height); lastRect=r;
  ctx.drawImage(img, r.offx, r.offy, cur.width*r.scale, cur.height*r.scale);
  if($("showOrig").checked && cur.original) gridFromPts(ctx, Object.values(cur.original), r, C_ORIG, false);
  if($("showModel").checked && cur.model) gridFromPts(ctx, Object.values(cur.model), r, C_MODEL, false);
  gridFromPts(ctx, edit, r, C_EDIT, true);  // editable, with drag handles
}

function setEdit(pts){ edit = (pts||[]).map(p=>p.slice()); }

async function show(i){
  if(!frames.length) return;
  idx=(i+frames.length)%frames.length;
  const f=frames[idx];
  markSeen(f.task_id);
  $("jump").value=idx+1;
  $("meta").textContent=`${f.session} / ${f.name}`;
  $("disagree").textContent=""; $("savedTag").innerHTML = f._saved ? '<span class="tag ok">saved ✓</span>' : "";
  cur=null; setEdit([]); dirty=false; refreshSaveBtn(); redraw();
  cur=await j(await fetch(`/api/capture-corners/frame/${f.task_id}`));
  // editable starts from the current labelled corners (fall back to model, else empty)
  if(cur.original && Object.keys(cur.original).length===4) setEdit(Object.values(cur.original));
  else if(cur.model) setEdit(Object.values(cur.model));
  const d=maxDisagree(edit.length===4?edit:null, cur.model);
  const frac = d!=null ? d/Math.max(cur.width,cur.height) : null;
  $("disagree").innerHTML = frac==null ? "" : `<span class="tag ${frac>0.02?'warn':''}">model Δ ${d.toFixed(0)}px (${(frac*100).toFixed(1)}%)</span>`;
  img=new Image(); img.onload=redraw; img.onerror=redraw; img.src=cur.image_url;
}

// ---- editing ----
function hit(px,py){ let best=-1,bd=16*16; edit.forEach(([x,y],k)=>{const [dx,dy]=toDisp(x,y,lastRect); const dd=(dx-px)**2+(dy-py)**2; if(dd<bd){bd=dd;best=k;}}); return best; }
const cv=$("cv");
cv.addEventListener("pointerdown",(e)=>{ if(edit.length!==4||!lastRect) return; const b=cv.getBoundingClientRect(); dragging=hit(e.clientX-b.left,e.clientY-b.top); if(dragging>=0){ cv.setPointerCapture(e.pointerId); e.preventDefault(); } });
cv.addEventListener("pointermove",(e)=>{ if(dragging<0||!lastRect) return; const b=cv.getBoundingClientRect(); edit[dragging]=toNative(e.clientX-b.left, e.clientY-b.top, lastRect); dirty=true; refreshSaveBtn(); redraw(); });
cv.addEventListener("pointerup",()=>{ dragging=-1; });
cv.addEventListener("pointercancel",()=>{ dragging=-1; });

$("useModel").onclick=()=>{ if(cur&&cur.model){ setEdit(Object.values(cur.model)); dirty=true; refreshSaveBtn(); redraw(); } else toast("no model corners"); };
$("reset").onclick=()=>{ if(cur&&cur.original){ setEdit(Object.values(cur.original)); dirty=false; refreshSaveBtn(); redraw(); } };
$("showModel").onchange=redraw; $("showOrig").onchange=redraw;

async function save(){
  if(edit.length!==4) return toast("need 4 corners");
  try{
    await j(await fetch("/api/capture-corners/save", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({task_id:frames[idx].task_id, corners:edit})}));
    dirty=false; refreshSaveBtn(); frames[idx]._saved=true; $("savedTag").innerHTML='<span class="tag ok">saved ✓</span>';
    toast("saved to Label Studio");
    goNext();  // auto-advance to the next (unseen) frame
  }catch(e){ toast("save failed: "+e.message); }
}
async function sync(){
  if(!confirm("Force Label Studio to export all annotations to the chess-annotations bucket?")) return;
  try{ const r=await j(await fetch("/api/capture-corners/sync",{method:"POST"})); toast(`export ${r.status} · ${r.last_sync_count} annotations`); }
  catch(e){ toast("sync failed: "+e.message); }
}
function goPrev(){ if(guardDirty()) show(idx-1); }  // Prev always steps back (revisit on purpose)
function goNext(){
  if(!guardDirty()) return;
  if($("skipSeen").checked){ const i=nextUnseen(idx); if(i<0) return toast("all frames seen ✓"); show(i); }
  else show(idx+1);
}
$("save").onclick=save; $("sync").onclick=sync;
$("prev").onclick=goPrev; $("next").onclick=goNext;
$("jump").onchange=()=>{ if(guardDirty()) show((parseInt($("jump").value,10)||1)-1); else $("jump").value=idx+1; };
$("resetSeen").onclick=()=>{ if(confirm("Forget all 'seen' marks and start the queue over?")){ seen.clear(); persistSeen(); updateSeenCount(); } };
window.addEventListener("keydown",(e)=>{
  if(e.target.tagName==="INPUT") return;
  if(e.key==="ArrowLeft")goPrev(); else if(e.key==="ArrowRight")goNext();
  else if(e.key==="s"||e.key==="S"){ e.preventDefault(); save(); }
});
window.addEventListener("resize", redraw);
window.addEventListener("beforeunload",(e)=>{ if(dirty){ e.preventDefault(); e.returnValue=""; } });

(async function init(){
  try{
    frames=await j(await fetch("/api/capture-corners/list"));
    $("total").textContent=frames.length; $("jump").max=frames.length;
    updateSeenCount();
    if(!frames.length){ $("meta").textContent="no capture frames found"; return; }
    let start=frames.findIndex(f=>!seen.has(f.task_id));  // resume at first unseen
    await show(start<0?0:start);
  }catch(e){ $("meta").textContent="error: "+e.message; }
})();
</script>
</body>
</html>
