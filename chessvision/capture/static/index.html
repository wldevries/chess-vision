<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>chessvision capture</title>
<style>
  :root {
    --bg: #15171c; --panel: #1f232b; --line: #2c313b; --fg: #e7e9ee;
    --muted: #9aa3b2; --accent: #4f8cff; --good: #36c46b; --bad: #ff5d5d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--fg); font: 16px/1.4 system-ui, sans-serif;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  header {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    padding: 10px 14px; background: var(--panel); border-bottom: 1px solid var(--line);
  }
  header .title { font-weight: 700; letter-spacing: .3px; }
  header .spacer { flex: 1; }
  select, button {
    font: inherit; color: var(--fg); background: #262b34; border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 14px; cursor: pointer;
  }
  select { max-width: 44vw; }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--accent); border-color: var(--accent); font-weight: 700; }
  button:disabled { opacity: .4; cursor: default; }
  .muted { color: var(--muted); font-size: 14px; }
  .progress { color: var(--muted); font-variant-numeric: tabular-nums; }

  main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 14px; min-height: 0; }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
  .pane { background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
          padding: 12px; display: flex; flex-direction: column; min-height: 0; }
  .pane h2 { margin: 0 0 8px; font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }

  .camera-wrap { position: relative; flex: 1; min-height: 0; background: #000; border-radius: 10px; overflow: hidden; }
  video, .layer { position: absolute; inset: 0; width: 100%; height: 100%; }
  video { object-fit: contain; display: block; }
  .layer { pointer-events: none; }
  .cam-empty { position: absolute; inset: 0; display: grid; place-items: center; color: var(--muted); text-align: center; padding: 20px; }

  .corner-modal { position: fixed; inset: 0; background: #000; display: none; z-index: 40; flex-direction: column; }
  .corner-modal.show { display: flex; }
  .corner-toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
                    padding: 10px 14px; background: var(--panel); border-bottom: 1px solid var(--line); }
  .corner-toolbar .hint { flex: 1; min-width: 200px; color: var(--fg); font-size: 14px; }
  .corner-canvas-area { flex: 1; position: relative; min-height: 0; }
  #cornerCanvas { position: absolute; inset: 0; width: 100%; height: 100%;
                  cursor: crosshair; touch-action: none; }
  .cam-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .cam-row.grow > select { flex: 1; max-width: none; }

  .board-wrap { flex: 1; min-height: 0; display: grid; place-items: center; }
  .board-wrap svg { width: 100%; height: 100%; max-width: 70vh; }
  .instruction { font-size: 18px; margin: 10px 2px 4px; min-height: 1.4em; }
  .move-label { font-weight: 700; color: var(--accent); }
  .board-controls { display: flex; gap: 10px; align-items: center; margin-top: 8px; flex-wrap: wrap; }

  .snapbar { display: flex; gap: 12px; align-items: center; margin-top: 12px; }
  .snap { flex: 1; font-size: 20px; padding: 18px; background: var(--good); border-color: var(--good); color: #06210f; font-weight: 800; }
  .snap:disabled { background: #2a3a30; border-color: #2a3a30; color: var(--muted); }

  footer { background: var(--panel); border-top: 1px solid var(--line); padding: 8px 12px; }
  .review { display: flex; gap: 8px; overflow-x: auto; align-items: center; min-height: 92px; }
  .review .empty { color: var(--muted); font-size: 14px; padding: 8px; }
  .thumb { position: relative; flex: 0 0 auto; border-radius: 8px; overflow: hidden; border: 1px solid var(--line); }
  .thumb img { display: block; height: 80px; width: auto; }
  .thumb .tag { position: absolute; left: 0; bottom: 0; right: 0; font-size: 11px; padding: 1px 4px;
                background: rgba(0,0,0,.6); color: #fff; }
  .thumb .del { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,.55); color: #fff;
                border: none; border-radius: 6px; padding: 2px 7px; font-size: 13px; line-height: 1; }

  .modal { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none; place-items: center; z-index: 20; }
  .modal.show { display: grid; }
  .modal img { max-width: 92vw; max-height: 86vh; border-radius: 8px; }
  .modal .close { position: absolute; top: 16px; right: 20px; font-size: 26px; background: none; border: none; color: #fff; }

  .toast { position: fixed; left: 50%; bottom: 110px; transform: translateX(-50%);
           background: #000a; border: 1px solid var(--line); padding: 10px 16px; border-radius: 10px;
           opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 30; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <header>
    <span class="title">♟ capture</span>
    <select id="gameSelect" title="Game"></select>
    <button id="startBtn">Start</button>
    <span class="spacer"></span>
    <span class="progress" id="progress">—</span>
  </header>

  <main>
    <section class="pane">
      <h2>Camera</h2>
      <div class="cam-row grow">
        <select id="cameraSelect" title="Camera"></select>
        <button id="refreshCams" title="Re-detect cameras">↻</button>
      </div>
      <div class="cam-row">
        <button id="markBtn" disabled>Mark corners</button>
        <button id="rotateBtn" hidden>Rotate grid</button>
        <span class="muted" id="cornerStatus">corners not set</span>
      </div>
      <div class="camera-wrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlayCanvas" class="layer"></canvas>
        <div class="cam-empty" id="camEmpty">Grant camera access and pick your board-facing camera.</div>
      </div>
      <div class="snapbar">
        <button class="snap" id="snapBtn" disabled>Snap ⏎</button>
      </div>
    </section>

    <section class="pane">
      <h2>Target position</h2>
      <div class="board-wrap" id="board"></div>
      <div class="instruction" id="instruction">Pick a game and press Start.</div>
      <div class="board-controls">
        <button id="prevBtn" disabled>◀ Prev</button>
        <button id="nextBtn" disabled>Skip ▶</button>
        <button id="flipBtn" disabled>Flip view</button>
      </div>
    </section>
  </main>

  <footer>
    <div class="review" id="review"><span class="empty">Snapped photos appear here for review.</span></div>
  </footer>

  <div class="modal" id="modal"><button class="close" id="modalClose">×</button><img id="modalImg" alt="" /></div>

  <div class="corner-modal" id="cornerModal">
    <div class="corner-toolbar">
      <span class="hint" id="cornerHint">Tap the 4 board corners.</span>
      <button id="undoCorner">Undo</button>
      <button id="cancelCorner">Cancel</button>
      <button id="saveCorner" class="primary" disabled>Save</button>
    </div>
    <div class="corner-canvas-area">
      <canvas id="cornerCanvas"></canvas>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <canvas id="canvas" hidden></canvas>

<script>
const $ = (id) => document.getElementById(id);
const ORIENTATIONS = ["R0", "R90", "R180", "R270"];

async function j(r) { const d = await r.json(); if (!r.ok) throw new Error(d.error || r.statusText); return d; }
function postForm(url, fields) {
  const body = new FormData();
  for (const [k, v] of Object.entries(fields)) body.append(k, v);
  return fetch(url, { method: "POST", body }).then(j);
}
function postJson(url, obj) {
  return fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(obj) }).then(j);
}

let state = null;        // latest session state from the server
let stream = null;       // active MediaStream
let cornerMode = false;  // marking corners?
let cornerPts = [];      // clicked points (native video px), order TL,TR,BR,BL
let frozen = null;       // offscreen canvas: the frame being marked
let dragging = null;     // index of corner being dragged, or null

/* ---------- coordinate mapping for object-fit: contain ---------- */
function containRect(vw, vh, cw, ch) {
  const scale = Math.min(cw / vw, ch / vh);
  const iw = vw * scale, ih = vh * scale;
  return { scale, offx: (cw - iw) / 2, offy: (ch - ih) / 2 };
}
const toDisplay = (x, y, r) => [r.offx + x * r.scale, r.offy + y * r.scale];
const toNative = (x, y, r) => [(x - r.offx) / r.scale, (y - r.offy) / r.scale];

/* ---------- camera ---------- */
async function listCameras() {
  try {
    if (!stream) {
      const tmp = await navigator.mediaDevices.getUserMedia({ video: true });
      tmp.getTracks().forEach((t) => t.stop());
    }
    const cams = (await navigator.mediaDevices.enumerateDevices()).filter((d) => d.kind === "videoinput");
    const sel = $("cameraSelect");
    sel.innerHTML = "";
    cams.forEach((d, i) => {
      const o = document.createElement("option");
      o.value = d.deviceId; o.textContent = d.label || `Camera ${i + 1}`;
      sel.appendChild(o);
    });
    const saved = localStorage.getItem("cv_camera");
    if (saved && cams.some((d) => d.deviceId === saved)) sel.value = saved;
    if (cams.length) await startCamera(sel.value);
    else toast("No camera found");
  } catch (e) { toast("Camera blocked: " + e.message); }
}
async function startCamera(deviceId) {
  if (stream) stream.getTracks().forEach((t) => t.stop());
  stream = await navigator.mediaDevices.getUserMedia({
    video: { deviceId: deviceId ? { exact: deviceId } : undefined, width: { ideal: 3840 }, height: { ideal: 2160 } },
  });
  $("video").srcObject = stream;
  $("camEmpty").style.display = "none";
  localStorage.setItem("cv_camera", deviceId);
  updateButtons();
}
async function onCameraChange(deviceId) {
  cancelCornerMode();
  await startCamera(deviceId);
  if (state) {                       // a new camera = a new view: drop old corners, reuse this camera's if any
    if (state.corners) state = await fetch(`/api/session/${state.session_id}/corners`, { method: "DELETE" }).then(j);
    await applySavedCorners();
    render();
  }
}
function currentDeviceId() { return $("cameraSelect").value; }

/* ---------- corner marking ---------- */
function enterCornerMode() {
  const v = $("video");
  if (!stream || !v.videoWidth) return toast("Camera not ready");
  if (!state) return toast("Start a game first");
  frozen = document.createElement("canvas");
  frozen.width = v.videoWidth; frozen.height = v.videoHeight;
  frozen.getContext("2d").drawImage(v, 0, 0);
  cornerPts = []; cornerMode = true; dragging = null;
  $("cornerModal").classList.add("show");
  requestAnimationFrame(redrawCorners);
}
function cancelCornerMode() {
  cornerMode = false; cornerPts = []; frozen = null; dragging = null;
  $("cornerModal").classList.remove("show");
  updateButtons();
}
function cornerDisplayRect() {
  const c = $("cornerCanvas");
  return containRect(frozen.width, frozen.height, c.clientWidth, c.clientHeight);
}
function pointerToNative(ev) {
  const c = $("cornerCanvas"), rect = c.getBoundingClientRect();
  const r = cornerDisplayRect();
  let [nx, ny] = toNative(ev.clientX - rect.left, ev.clientY - rect.top, r);
  return [Math.max(0, Math.min(frozen.width, nx)), Math.max(0, Math.min(frozen.height, ny))];
}
function hitTestCorner(ev) {
  const c = $("cornerCanvas"), rect = c.getBoundingClientRect();
  const r = cornerDisplayRect();
  const px = ev.clientX - rect.left, py = ev.clientY - rect.top;
  const HIT = 24; // generous touch target in display px
  let bestI = -1, bestD = HIT * HIT;
  cornerPts.forEach(([x, y], i) => {
    const [dx, dy] = toDisplay(x, y, r);
    const d = (dx - px) ** 2 + (dy - py) ** 2;
    if (d < bestD) { bestD = d; bestI = i; }
  });
  return bestI;
}
function cornerPointerDown(ev) {
  if (!cornerMode) return;
  ev.preventDefault();
  $("cornerCanvas").setPointerCapture(ev.pointerId);
  const hit = hitTestCorner(ev);
  if (hit >= 0) { dragging = hit; return; }
  if (cornerPts.length < 4) {
    cornerPts.push(pointerToNative(ev));
    dragging = cornerPts.length - 1;
    redrawCorners();
  }
}
function cornerPointerMove(ev) {
  if (!cornerMode || dragging === null) return;
  cornerPts[dragging] = pointerToNative(ev);
  redrawCorners();
}
function cornerPointerUp(ev) {
  if (dragging !== null) { dragging = null; redrawCorners(); }
}
const CORNER_LABELS = ["TL", "TR", "BR", "BL"];
const CORNER_NAMES = ["top-left", "top-right", "bottom-right", "bottom-left"];
function redrawCorners() {
  const c = $("cornerCanvas");
  c.width = c.clientWidth; c.height = c.clientHeight;
  const ctx = c.getContext("2d");
  const r = containRect(frozen.width, frozen.height, c.width, c.height);
  ctx.drawImage(frozen, r.offx, r.offy, frozen.width * r.scale, frozen.height * r.scale);
  ctx.lineWidth = 2; ctx.strokeStyle = "#4f8cff"; ctx.fillStyle = "#4f8cff"; ctx.font = "14px system-ui";
  ctx.beginPath();
  cornerPts.forEach(([x, y], i) => {
    const [dx, dy] = toDisplay(x, y, r);
    if (i === 0) ctx.moveTo(dx, dy); else ctx.lineTo(dx, dy);
  });
  if (cornerPts.length === 4) ctx.closePath();
  ctx.stroke();
  cornerPts.forEach(([x, y], i) => {
    const [dx, dy] = toDisplay(x, y, r);
    ctx.beginPath(); ctx.arc(dx, dy, 8, 0, 7); ctx.fill();
    ctx.fillText(CORNER_LABELS[i], dx + 11, dy - 11);
  });
  $("cornerHint").textContent = cornerPts.length < 4
    ? `Tap the ${CORNER_NAMES[cornerPts.length]} corner (${CORNER_LABELS[cornerPts.length]}). Drag any marker to adjust.`
    : "All 4 placed. Drag any marker to refine, then press Save.";
  $("saveCorner").disabled = cornerPts.length !== 4;
}
async function saveCorners() {
  if (cornerPts.length !== 4) return;
  const [tl, tr, br, bl] = cornerPts;
  try {
    state = await postJson(`/api/session/${state.session_id}/corners`, {
      top_left: tl, top_right: tr, bottom_right: br, bottom_left: bl, orientation: state.orientation,
    });
    localStorage.setItem(cornerKey(), JSON.stringify({ corners: state.corners, orientation: state.orientation }));
    toast("Corners set — rotate the grid if pieces sit on the wrong squares");
  } catch (e) { toast("Corners failed: " + e.message); }
  cancelCornerMode();
  render();
}
function cornerKey() { return `cv_corners_${currentDeviceId()}`; }
async function applySavedCorners() {
  const raw = localStorage.getItem(cornerKey());
  if (!raw || !state) return;
  try {
    const { corners, orientation } = JSON.parse(raw);
    state = await postJson(`/api/session/${state.session_id}/corners`, { ...corners, orientation });
    toast("Reusing this camera's saved corners — Redo if the board moved");
  } catch { /* ignore stale cache */ }
}
async function rotateGrid() {
  if (!state || !state.corners) return;
  const next = ORIENTATIONS[(ORIENTATIONS.indexOf(state.orientation) + 1) % 4];
  state = await postForm(`/api/session/${state.session_id}/orientation`, { orientation: next });
  localStorage.setItem(cornerKey(), JSON.stringify({ corners: state.corners, orientation: state.orientation }));
  render();
}

/* ---------- live overlay (grid + guesstimated piece base points) ---------- */
function drawOverlay() {
  const c = $("overlayCanvas"), v = $("video");
  if (cornerMode || !state || !state.overlay || !v.videoWidth) { c.width = c.width; return; }
  c.width = c.clientWidth; c.height = c.clientHeight;
  const ctx = c.getContext("2d");
  const r = containRect(v.videoWidth, v.videoHeight, c.width, c.height);
  const lat = state.overlay.lattice;
  const P = (k) => toDisplay(lat[k][0], lat[k][1], r);
  ctx.lineWidth = 1.5; ctx.strokeStyle = "rgba(79,140,255,.55)";
  for (let row = 0; row < 9; row++) {
    ctx.beginPath();
    for (let col = 0; col < 9; col++) { const [x, y] = P(row * 9 + col); col ? ctx.lineTo(x, y) : ctx.moveTo(x, y); }
    ctx.stroke();
  }
  for (let col = 0; col < 9; col++) {
    ctx.beginPath();
    for (let row = 0; row < 9; row++) { const [x, y] = P(row * 9 + col); row ? ctx.lineTo(x, y) : ctx.moveTo(x, y); }
    ctx.stroke();
  }
  state.overlay.pieces.forEach((p) => {
    const [x, y] = toDisplay(p.base[0], p.base[1], r);
    ctx.beginPath(); ctx.arc(x, y, 6, 0, 7);
    ctx.fillStyle = p.color === "w" ? "#f5f5f5" : "#1a1a1a";
    ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = p.color === "w" ? "#1a1a1a" : "#f5f5f5"; ctx.stroke();
  });
}
function overlayLoop() { try { drawOverlay(); } catch { /* transient */ } requestAnimationFrame(overlayLoop); }

/* ---------- capture ---------- */
function captureBlob() {
  const v = $("video"), c = $("canvas");
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext("2d").drawImage(v, 0, 0);
  return new Promise((res) => c.toBlob(res, "image/jpeg", 0.92));
}
async function snap() {
  if (!state || !stream || cornerMode) return;
  $("snapBtn").disabled = true;
  try {
    const blob = await captureBlob();
    const body = new FormData();
    body.append("image", blob, "frame.jpg");
    state = await fetch(`/api/session/${state.session_id}/snap`, { method: "POST", body }).then(j);
    render();
    toast("Saved ✓");
  } catch (e) { toast("Snap failed: " + e.message); }
  updateButtons();
}

/* ---------- session flow ---------- */
async function loadGames() {
  const games = await fetch("/api/games").then(j);
  const sel = $("gameSelect");
  sel.innerHTML = "";
  games.forEach((g) => {
    const o = document.createElement("option");
    o.value = g.game_id; o.textContent = `${g.label}  ·  ${g.n_plies} plies`;
    sel.appendChild(o);
  });
}
async function startSession() {
  state = await postForm("/api/session", { game_id: $("gameSelect").value });
  await applySavedCorners();
  render();
  toast("Session " + state.session_id);
}
async function goto(i) { if (state) { state = await postForm(`/api/session/${state.session_id}/goto`, { ply_index: i }); render(); } }
async function flipView() {
  if (!state) return;
  state = await postForm(`/api/session/${state.session_id}/view`, { view: state.view === "white" ? "black" : "white" });
  render();
}
async function delCapture(fn) { if (state) { state = await fetch(`/api/session/${state.session_id}/capture/${fn}`, { method: "DELETE" }).then(j); render(); } }

/* ---------- render ---------- */
function render() {
  if (!state) return;
  $("board").innerHTML = state.board_svg;
  const ply = state.ply;
  $("instruction").innerHTML = state.instruction.replace(ply.move_label, `<span class="move-label">${ply.move_label}</span>`);
  $("progress").textContent = `${state.game.white} – ${state.game.black}  ·  ply ${state.ply_index}/${state.n_plies - 1}`;
  $("prevBtn").disabled = state.ply_index <= 0;
  $("nextBtn").disabled = state.ply_index >= state.n_plies - 1;
  const done = state.captured_plies.includes(state.ply_index);
  $("nextBtn").textContent = state.ply_index >= state.n_plies - 1 ? "End" : (done ? "Next ▶" : "Skip ▶");
  renderReview();
  updateButtons();
}
function updateButtons() {
  const live = !!(state && stream);
  $("snapBtn").disabled = !live || cornerMode;
  $("flipBtn").disabled = !state;
  $("markBtn").disabled = !live;
  $("markBtn").textContent = state && state.corners ? "Redo corners" : "Mark corners";
  const hasCorners = !!(state && state.corners);
  $("rotateBtn").hidden = !hasCorners;
  $("cornerStatus").textContent = hasCorners ? `corners set · grid ${state.orientation}` : "corners not set";
}
function renderReview() {
  const el = $("review");
  if (!state.captures.length) { el.innerHTML = '<span class="empty">Snapped photos appear here for review.</span>'; return; }
  el.innerHTML = "";
  state.captures.slice().reverse().forEach((c) => {
    const d = document.createElement("div");
    d.className = "thumb";
    d.innerHTML = `<img src="${c.url}" alt="" loading="lazy" />` +
      `<span class="tag">${c.ply_index}: ${c.move_label}</span>` +
      `<button class="del" title="Delete">×</button>`;
    d.querySelector("img").onclick = () => openModal(c.url);
    d.querySelector(".del").onclick = (ev) => { ev.stopPropagation(); delCapture(c.filename); };
    el.appendChild(d);
  });
}
function openModal(url) { $("modalImg").src = url; $("modal").classList.add("show"); }

let toastTimer = null;
function toast(msg) {
  const t = $("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

/* ---------- wiring ---------- */
$("startBtn").onclick = () => startSession().catch((e) => toast(e.message));
$("snapBtn").onclick = snap;
$("prevBtn").onclick = () => goto(state.ply_index - 1);
$("nextBtn").onclick = () => goto(state.ply_index + 1);
$("flipBtn").onclick = flipView;
$("markBtn").onclick = enterCornerMode;
$("rotateBtn").onclick = rotateGrid;
$("refreshCams").onclick = listCameras;
$("cameraSelect").onchange = (e) => onCameraChange(e.target.value).catch((err) => toast(err.message));
$("cornerCanvas").addEventListener("pointerdown", cornerPointerDown);
$("cornerCanvas").addEventListener("pointermove", cornerPointerMove);
$("cornerCanvas").addEventListener("pointerup", cornerPointerUp);
$("cornerCanvas").addEventListener("pointercancel", cornerPointerUp);
$("cornerModal").addEventListener("contextmenu", (e) => e.preventDefault());
$("undoCorner").onclick = () => { if (cornerPts.length) { cornerPts.pop(); redrawCorners(); } };
$("cancelCorner").onclick = cancelCornerMode;
$("saveCorner").onclick = () => saveCorners().catch((e) => toast(e.message));
window.addEventListener("resize", () => { if (cornerMode && frozen) redrawCorners(); });
$("modalClose").onclick = () => $("modal").classList.remove("show");
$("modal").onclick = (e) => { if (e.target.id === "modal") $("modal").classList.remove("show"); };
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "SELECT") return;
  if (cornerMode) {
    if (e.code === "Escape") cancelCornerMode();
    else if (e.code === "Enter" && cornerPts.length === 4) { e.preventDefault(); saveCorners().catch((err) => toast(err.message)); }
    else if (e.code === "Backspace" && cornerPts.length) { e.preventDefault(); cornerPts.pop(); redrawCorners(); }
    return;
  }
  if (e.code === "Space" || e.code === "Enter") { e.preventDefault(); snap(); }
  else if (e.code === "ArrowLeft") goto(state.ply_index - 1);
  else if (e.code === "ArrowRight") goto(state.ply_index + 1);
});

loadGames().catch((e) => toast(e.message));
listCameras();
overlayLoop();
</script>
</body>
</html>
