<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>chessvision</title>
<style>
  :root {
    --bg: #15171c; --panel: #1f232b; --line: #2c313b; --fg: #e7e9ee;
    --muted: #9aa3b2; --accent: #4f8cff; --good: #36c46b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    background: var(--bg); color: var(--fg); font: 16px/1.5 system-ui, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 6vh 16px;
  }
  h1 { font-size: 28px; margin: 0 0 4px; letter-spacing: .3px; }
  .sub { color: var(--muted); margin: 0 0 32px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px;
          width: min(820px, 100%); }
  .card { display: block; text-decoration: none; color: var(--fg); background: var(--panel);
          border: 1px solid var(--line); border-radius: 14px; padding: 20px; transition: border-color .15s, transform .05s; }
  .card:hover { border-color: var(--accent); }
  .card:active { transform: translateY(1px); }
  .card.off { opacity: .5; pointer-events: none; }
  .card .ico { font-size: 26px; }
  .card .name { font-weight: 700; font-size: 18px; margin: 8px 0 4px; }
  .card .desc { color: var(--muted); font-size: 14px; }
  .card .flag { display: inline-block; margin-top: 10px; font-size: 12px; color: var(--good);
                background: #1c2a20; border: 1px solid #234a30; border-radius: 999px; padding: 2px 10px; }
  .card.off .flag { color: #e0a030; background: #2a2418; border-color: #4a3f23; }
</style>
</head>
<body>
  <h1>♟ chessvision</h1>
  <p class="sub">Capture & labelling tools</p>
  <div class="grid" id="grid"></div>

<script>
const $ = (id) => document.getElementById(id);
async function avail(url) { try { return (await fetch(url).then((r) => r.json())).available; } catch { return false; } }

// Each tool is always navigable, but cards whose launch flag is missing are dimmed with
// a hint so the dependency (a CLI flag) is obvious without reading the docs.
const TOOLS = [
  { href: "/capture", ico: "📷", name: "Capture", desc: "Label a known game/puzzle: mark corners, snap each ply." },
  { href: "/positions", ico: "♜", name: "Label positions", desc: "Project a known FEN onto a corner photo and nudge piece bases.",
    check: () => avail("/api/positions/available"), need: "--corners-root" },
  { href: "/corners", ico: "▦", name: "Label corners", desc: "Mark board corners on staged phone photos.",
    check: () => avail("/api/corners-label/available"), need: "--corners-root" },
  { href: "/live", ico: "👁", name: "Read position", desc: "Read an unknown position from the camera to FEN.",
    check: () => avail("/api/live/available"), need: "--keypoint-ckpt + --corner-ckpt" },
  { href: "/sessions", ico: "🏷", name: "Edit sessions", desc: "Tag past sessions with set / board / camera / surface." },
];

function card(t, on) {
  const a = document.createElement("a");
  a.className = "card" + (t.check && !on ? " off" : "");
  a.href = t.href;
  a.innerHTML = `<div class="ico">${t.ico}</div><div class="name">${t.name}</div><div class="desc">${t.desc}</div>` +
    (t.need ? `<span class="flag">${on ? "ready" : "needs " + t.need}</span>` : "");
  return a;
}
(async function init() {
  const grid = $("grid");
  for (const t of TOOLS) {
    const on = t.check ? await t.check() : true;
    grid.appendChild(card(t, on));
  }
})();
</script>
</body>
</html>
