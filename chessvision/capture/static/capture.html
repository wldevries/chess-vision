<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>chessvision — capture</title>
<style>
  :root {
    --bg: #15171c; --panel: #1f232b; --line: #2c313b; --fg: #e7e9ee;
    --muted: #9aa3b2; --accent: #4f8cff; --good: #36c46b; --bad: #ff5d5d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--fg); font: 16px/1.4 system-ui, sans-serif;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  header {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    padding: 10px 14px; background: var(--panel); border-bottom: 1px solid var(--line);
  }
  header .title { font-weight: 700; letter-spacing: .3px; }
  header .spacer { flex: 1; }
  a.backlink { color: var(--muted); text-decoration: none; padding: 8px 10px; border-radius: 8px; }
  a.backlink:hover { background: #262b34; color: var(--fg); }
  select, button {
    font: inherit; color: var(--fg); background: #262b34; border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 14px; cursor: pointer;
  }
  select { max-width: 44vw; }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--accent); border-color: var(--accent); font-weight: 700; }
  button:disabled { opacity: .4; cursor: default; }
  .muted { color: var(--muted); font-size: 14px; }
  .progress { color: var(--muted); font-variant-numeric: tabular-nums; }

  main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 14px; min-height: 0; }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
  .pane { background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
          padding: 12px; display: flex; flex-direction: column; min-height: 0; }
  .pane h2 { margin: 0 0 8px; font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }

  .camera-wrap { position: relative; flex: 1; min-height: 0; background: #000; border-radius: 10px; overflow: hidden; }
  video, .layer { position: absolute; inset: 0; width: 100%; height: 100%; }
  video { object-fit: contain; display: block; }
  .layer { pointer-events: none; }
  .cam-empty { position: absolute; inset: 0; display: grid; place-items: center; color: var(--muted); text-align: center; padding: 20px; }

  .corner-modal { position: fixed; inset: 0; background: #000; display: none; z-index: 40; flex-direction: column; }
  .corner-modal.show { display: flex; }
  .corner-toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
                    padding: 10px 14px; background: var(--panel); border-bottom: 1px solid var(--line); }
  .corner-toolbar .hint { flex: 1; min-width: 200px; color: var(--fg); font-size: 14px; }
  .corner-toolbar .exit { margin-left: 22px; }
  .corner-canvas-area { flex: 1; position: relative; min-height: 0; }
  #cornerCanvas { position: absolute; inset: 0; width: 100%; height: 100%;
                  cursor: crosshair; touch-action: none; }
  .cam-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .cam-row.grow > select { flex: 1; max-width: none; }

  .board-wrap { flex: 1; min-height: 0; display: grid; place-items: center; }
  .board-wrap svg { width: 100%; height: 100%; max-width: 70vh; }
  .instruction { font-size: 18px; margin: 10px 2px 4px; min-height: 1.4em; }
  .move-label { font-weight: 700; color: var(--accent); }
  .board-controls { display: flex; gap: 10px; align-items: center; margin-top: 8px; flex-wrap: wrap; }

  .snapbar { display: flex; gap: 12px; align-items: center; margin-top: 12px; }
  .snap { flex: 1; font-size: 20px; padding: 18px; background: var(--good); border-color: var(--good); color: #06210f; font-weight: 800; }
  .snap:disabled { background: #2a3a30; border-color: #2a3a30; color: var(--muted); }

  footer { background: var(--panel); border-top: 1px solid var(--line); padding: 8px 12px; }
  .review { display: flex; gap: 8px; overflow-x: auto; align-items: center; min-height: 92px; }
  .review .empty { color: var(--muted); font-size: 14px; padding: 8px; }
  .thumb { position: relative; flex: 0 0 auto; border-radius: 8px; overflow: hidden; border: 1px solid var(--line); }
  .thumb img { display: block; height: 80px; width: auto; }
  .thumb .tag { position: absolute; left: 0; bottom: 0; right: 0; font-size: 11px; padding: 1px 4px;
                background: rgba(0,0,0,.6); color: #fff; }
  .thumb .del { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,.55); color: #fff;
                border: none; border-radius: 6px; padding: 2px 7px; font-size: 13px; line-height: 1; }

  .modal { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none; place-items: center; z-index: 20; }
  .modal.show { display: grid; }
  .modal img { max-width: 92vw; max-height: 86vh; border-radius: 8px; }
  .modal .close { position: absolute; top: 16px; right: 20px; font-size: 26px; background: none; border: none; color: #fff; }

  .picker-card { width: min(560px, 92vw); max-height: 80vh; display: flex; flex-direction: column;
                 background: #181c22; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .picker-card h3 { margin: 0; padding: 14px 16px; border-bottom: 1px solid var(--line); font-size: 16px; }
  .picker-list { overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
  .picker-item { display: flex; justify-content: space-between; align-items: center; gap: 12px;
                 width: 100%; text-align: left; padding: 12px 14px; background: #20262e;
                 border: 1px solid var(--line); border-radius: 8px; color: var(--fg); cursor: pointer; }
  .picker-item:hover { border-color: var(--accent); }
  .picker-item .pi-meta { color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .picker-empty { color: var(--muted); padding: 24px; text-align: center; }

  .toast { position: fixed; left: 50%; bottom: 110px; transform: translateX(-50%);
           background: #000a; border: 1px solid var(--line); padding: 10px 16px; border-radius: 10px;
           opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 30; }
  .toast.show { opacity: 1; }

  .result-chip { display: none; font-weight: 700; padding: 4px 10px; border-radius: 999px;
                 border: 1px solid var(--line); background: #262b34; color: var(--fg);
                 font-variant-numeric: tabular-nums; }
  .result-chip.show { display: inline-flex; gap: 6px; align-items: center; }
  .result-chip.win-white { background: #f5f5f5; color: #15171c; border-color: #f5f5f5; }
  .result-chip.win-black { background: #1a1a1a; color: #f5f5f5; border-color: #3a3a3a; }
  .result-chip.draw { background: #3a3f4a; color: var(--fg); border-color: #3a3f4a; }

  .instruction.complete { color: #06210f; background: var(--good); border-radius: 10px;
                          padding: 10px 14px; font-weight: 700; }
  .instruction.complete .move-label { color: #06210f; }
</style>
</head>
<body>
  <header>
    <span class="title">♟ Capture</span>
    <a class="backlink" href="/" title="Back to menu">☰ menu</a>
    <select id="setSelect" title="Piece set used (tagged onto the session)"></select>
    <select id="boardSelect" title="Board used (tagged onto the session)"></select>
    <button id="selectGameBtn" title="Choose a game from the loaded collection">Select game</button>
    <select id="puzzleTheme" title="Puzzle theme">
      <option value="middlegame">middlegame</option>
      <option value="any">any</option>
      <option value="opening">opening</option>
      <option value="endgame">endgame</option>
    </select>
    <button id="puzzleBtn" title="Fetch a fresh Lichess puzzle">Next puzzle</button>
    <button id="finishBtn" title="Upload now — only needed if you stop before the position is fully captured. A completed game/puzzle uploads automatically.">Finish &amp; upload</button>
    <span class="spacer"></span>
    <span class="result-chip" id="resultChip"></span>
    <span class="progress" id="progress">—</span>
  </header>

  <main>
    <section class="pane">
      <h2>Camera</h2>
      <div class="cam-row grow">
        <select id="cameraSelect" title="Camera"></select>
        <button id="refreshCams" title="Re-detect cameras">↻</button>
      </div>
      <div class="cam-row">
        <button id="markBtn" disabled>Mark corners</button>
        <button id="rotateBtn" hidden title="Rotate the projected grid so pieces land on the right squares">Rotate grid</button>
        <span class="muted" id="cornerStatus">corners not set</span>
      </div>
      <div class="camera-wrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlayCanvas" class="layer"></canvas>
        <div class="cam-empty" id="camEmpty">Grant camera access and pick your board-facing camera.</div>
      </div>
      <div class="snapbar">
        <button class="snap" id="snapBtn" disabled>Snap ⏎</button>
      </div>
    </section>

    <section class="pane">
      <h2 id="gameTitle" title="Current game / puzzle">No game selected</h2>
      <div class="board-wrap" id="board"></div>
      <div class="instruction" id="instruction">Select a game or fetch a puzzle to begin.</div>
      <div class="board-controls">
        <button id="prevBtn" disabled>◀ Prev</button>
        <button id="nextBtn" disabled>Skip ▶</button>
        <button id="flipBtn" disabled title="Flip the preview board (White / Black at the bottom)">Flip ⇅</button>
      </div>
    </section>
  </main>

  <footer>
    <div class="review" id="review"><span class="empty">Snapped photos appear here for review.</span></div>
  </footer>

  <div class="modal" id="modal"><button class="close" id="modalClose">×</button><img id="modalImg" alt="" /></div>

  <div class="modal" id="gameModal">
    <div class="picker-card">
      <h3>Select game</h3>
      <div class="picker-list" id="gameList"></div>
    </div>
  </div>

  <div class="corner-modal" id="cornerModal">
    <div class="corner-toolbar">
      <span class="hint" id="cornerHint">Tap the 4 board corners.</span>
      <button id="predictCorner" hidden>Predict</button>
      <button id="saveCorner" class="primary" disabled>Save</button>
      <button id="cancelCorner" class="exit">Close</button>
    </div>
    <div class="corner-canvas-area">
      <canvas id="cornerCanvas"></canvas>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <canvas id="canvas" hidden></canvas>

<script src="/static/cv.js"></script>
<script>
// Capture mode: label a known game/puzzle. The camera, corner-marking modal (CM),
// projection grid, and overlay drawing all come from cv.js; this file is the session
// flow, snap, review, and board preview.
let state = null;        // latest session state from the server
let snapping = false;    // a /snap request is in flight (re-entrancy guard)

window.onCameraStarted = updateButtons;
async function onCameraChange(deviceId) {
  CM.close();
  await startCamera(deviceId);
  // A new camera = a new view: drop old corners, reuse this camera's saved ones if any.
  if (state) {
    if (state.corners) state = await fetch(`/api/session/${state.session_id}/corners`, { method: "DELETE" }).then(j);
    await applySavedCorners();
    render();
  }
}

/* ---------- corner marking (opens the shared modal) ---------- */
function existingCornerPts() {
  const c = state && state.corners;
  if (!c || !c.top_left) return [];
  return [c.top_left, c.top_right, c.bottom_right, c.bottom_left].map((p) => p.slice());
}
function enterCornerMode() {
  const v = $("video");
  if (!stream || !v.videoWidth) return toast("Camera not ready");
  if (!state) return toast("Start a game first");
  const frozen = document.createElement("canvas");
  frozen.width = v.videoWidth; frozen.height = v.videoHeight;
  frozen.getContext("2d").drawImage(v, 0, 0);
  CM.open(frozen, { initialPts: existingCornerPts(), onSave: saveCorners });
}
async function saveCorners(o) {
  try {
    state = await postJson(`/api/session/${state.session_id}/corners`, {
      top_left: o.tl, top_right: o.tr, bottom_right: o.br, bottom_left: o.bl, orientation: state.orientation,
    });
    localStorage.setItem(cornerKey(), JSON.stringify({ corners: state.corners, orientation: state.orientation }));
    toast("Corners set — rotate the grid if pieces sit on the wrong squares");
  } catch (e) { toast("Corners failed: " + e.message); }
  CM.close();
  render();
}
function cornerKey() { return `cv_corners_${currentDeviceId()}`; }
async function applySavedCorners() {
  const raw = localStorage.getItem(cornerKey());
  if (!raw || !state) return;
  try {
    const { corners, orientation } = JSON.parse(raw);
    state = await postJson(`/api/session/${state.session_id}/corners`, { ...corners, orientation });
    toast("Reusing this camera's saved corners — Redo if the board moved");
  } catch { /* ignore stale cache */ }
}
async function rotateGrid() {
  if (!state || !state.corners) return;
  const next = ORIENTATIONS[(ORIENTATIONS.indexOf(state.orientation) + 1) % 4];
  state = await postForm(`/api/session/${state.session_id}/orientation`, { orientation: next });
  localStorage.setItem(cornerKey(), JSON.stringify({ corners: state.corners, orientation: state.orientation }));
  render();
}

/* ---------- corner-assist ---------- */
async function checkCornerAssist() {
  await CM.checkAssist();  // toggles the Predict button; capture marks manually otherwise
}

/* ---------- live overlay (move highlight + grid + base dots) ---------- */
function drawCaptureOverlay(ctx, r) {
  if (!state || !state.overlay) return;
  const mv = state.overlay.move;
  if (mv) {
    const fillSquare = (quad) => {
      ctx.beginPath();
      quad.forEach(([qx, qy], k) => { const [px, py] = toDisplay(qx, qy, r); k ? ctx.lineTo(px, py) : ctx.moveTo(px, py); });
      ctx.closePath();
      ctx.fillStyle = "rgba(255,206,38,.42)"; ctx.fill();
      ctx.strokeStyle = "rgba(255,206,38,.95)"; ctx.lineWidth = 2; ctx.stroke();
    };
    fillSquare(mv.from.quad); fillSquare(mv.to.quad);
  }
  drawGrid(ctx, state.overlay.lattice, r);
  state.overlay.pieces.forEach((p) => { const [x, y] = toDisplay(p.base[0], p.base[1], r); drawDot(ctx, x, y, p.color); });
}
function drawOverlay() {
  const o = overlayCtx();
  if (o) drawCaptureOverlay(o.ctx, o.r);
}
function overlayLoop() { try { drawOverlay(); } catch { /* transient */ } requestAnimationFrame(overlayLoop); }

/* ---------- capture ---------- */
async function snap() {
  if (!state || !stream || CM.active || snapping) return;
  snapping = true;
  $("snapBtn").disabled = true;
  try {
    const blob = await captureBlob();
    const body = new FormData();
    body.append("image", blob, "frame.jpg");
    state = await fetch(`/api/session/${state.session_id}/snap`, { method: "POST", body }).then(j);
    render();
    toast("Saved ✓");
  } catch (e) { toast("Snap failed: " + e.message); }
  finally { snapping = false; updateButtons(); }
}

/* ---------- session flow ---------- */
async function openGamePicker() {
  const list = $("gameList");
  list.innerHTML = '<div class="picker-empty">Loading…</div>';
  $("gameModal").classList.add("show");
  let games = [];
  try { games = (await fetch("/api/games").then(j)).filter((g) => !g.game_id.startsWith("puzzle-")); }
  catch (e) { list.innerHTML = `<div class="picker-empty">Could not load games: ${e.message}</div>`; return; }
  if (!games.length) { list.innerHTML = '<div class="picker-empty">No games loaded. Launch with --pgn FILE.</div>'; return; }
  list.innerHTML = "";
  games.forEach((g) => {
    const b = document.createElement("button");
    b.className = "picker-item";
    b.innerHTML = `<span class="pi-label"></span><span class="pi-meta">${g.n_plies} plies</span>`;
    b.querySelector(".pi-label").textContent = g.label;  // textContent: don't trust labels as HTML
    b.onclick = () => { closeGamePicker(); startSession(g.game_id).catch((e) => toast(e.message)); };
    list.appendChild(b);
  });
}
function closeGamePicker() { $("gameModal").classList.remove("show"); }

// The selected camera's human label, minus the trailing USB vendor:product id the
// browser appends to disambiguate identical devices (e.g. " (046d:0982)").
function currentCameraLabel() {
  const sel = $("cameraSelect"), opt = sel.options[sel.selectedIndex];
  return opt ? opt.textContent.replace(/\s*\([0-9a-f]{4}:[0-9a-f]{4}\)\s*$/i, "").trim() : "";
}
async function startSession(gameId) {
  state = await postForm("/api/session", {
    game_id: gameId,
    piece_set: $("setSelect").value,
    board: $("boardSelect").value,
    device: currentCameraLabel(),
  });
  await applySavedCorners();
  render();
  toast("Session " + state.session_id);
}
async function nextPuzzle() {
  const theme = $("puzzleTheme").value;
  const fields = {};
  if (theme && theme !== "any") fields.theme = theme;
  if (theme !== "endgame") fields.min_pieces = 20;  // bias toward dense, occlusion-heavy boards
  toast("Fetching puzzle…");
  const g = await postForm("/api/puzzles/next", fields);
  await startSession(g.game_id);
}
async function goto(i) { if (state) { state = await postForm(`/api/session/${state.session_id}/goto`, { ply_index: i }); render(); } }
// Flip the preview board between White's and Black's view via the server's SVG renderer
// (chess.svg orientation) — coordinates flip with it, no CSS transform.
async function flipBoard() {
  if (!state) return;
  state = await postForm(`/api/session/${state.session_id}/view`, { view: state.view === "white" ? "black" : "white" });
  render();
}
async function delCapture(fn) { if (state) { state = await fetch(`/api/session/${state.session_id}/capture/${fn}`, { method: "DELETE" }).then(j); render(); } }

/* ---------- finish: upload photos + metadata, create Label Studio tasks ---------- */
let finishing = false;
const finishedSessions = new Set();
async function finishSession(auto = false) {
  if (!state || finishing) return;
  const sid = state.session_id;
  if (auto && finishedSessions.has(sid)) return;
  finishing = true;
  try {
    if (!auto) toast("Uploading & creating tasks…");
    const r = await postForm(`/api/session/${sid}/finish`, {});
    finishedSessions.add(sid);
    toast(`Uploaded ${r.uploaded} file(s) · ${r.tasks} task(s)`);
  } finally { finishing = false; }
}

/* ---------- render ---------- */
function render() {
  if (!state) return;
  $("gameTitle").textContent = state.game.label;
  $("board").innerHTML = state.board_svg;
  const ply = state.ply;
  const instr = $("instruction");
  if (state.game_complete) {
    const label = state.game.result_label || "Game over";
    instr.classList.add("complete");
    instr.textContent = `🏁 Game complete · ${state.game.result} — ${label}.`;
  } else {
    instr.classList.remove("complete");
    instr.innerHTML = state.instruction.replace(ply.move_label, `<span class="move-label">${ply.move_label}</span>`);
  }
  $("progress").textContent = state.game_complete
    ? `${state.game.white} – ${state.game.black}  ·  ${state.captures.length}/${state.n_plies} snapped`
    : `${state.game.white} – ${state.game.black}  ·  ply ${state.ply_index}/${state.n_plies - 1}`;
  renderResultChip();
  // Auto-publish once the game/puzzle is fully captured (guarded against repeats).
  if (state.game_complete && !finishedSessions.has(state.session_id) && !finishing) {
    finishSession(true).catch((e) => toast(e.message));
  }
  $("prevBtn").disabled = state.ply_index <= 0;
  $("nextBtn").disabled = state.ply_index >= state.n_plies - 1;
  const done = state.captured_plies.includes(state.ply_index);
  $("nextBtn").textContent = state.ply_index >= state.n_plies - 1 ? "End" : (done ? "Next ▶" : "Skip ▶");
  renderReview();
  updateButtons();
}
function renderResultChip() {
  const chip = $("resultChip");
  if (!state || !state.game_complete) { chip.classList.remove("show"); return; }
  const r = state.game.result;
  chip.className = "result-chip show " + (
    r === "1-0" ? "win-white" : r === "0-1" ? "win-black" : r === "1/2-1/2" ? "draw" : ""
  );
  chip.textContent = state.game.result_label ? `${r} · ${state.game.result_label}` : r;
}
function updateButtons() {
  const camReady = !!(stream && $("video").videoWidth);
  const complete = !!(state && state.game_complete);
  $("snapBtn").disabled = !(state && camReady) || CM.active || complete;
  $("snapBtn").textContent = complete ? "Game complete ✓" : "Snap ⏎";
  $("flipBtn").disabled = !state;
  $("markBtn").disabled = !(state && camReady);
  $("markBtn").textContent = state && state.corners ? "Redo corners" : "Mark corners";
  const hasCorners = !!(state && state.corners);
  $("rotateBtn").hidden = !hasCorners;
  $("cornerStatus").textContent = !state ? "start a game to mark corners"
    : !camReady ? "camera not ready"
    : hasCorners ? `corners set · grid ${state.orientation}` : "corners not set";
}
function renderReview() {
  const el = $("review");
  if (!state.captures.length) { el.innerHTML = '<span class="empty">Snapped photos appear here for review.</span>'; return; }
  el.innerHTML = "";
  state.captures.slice().reverse().forEach((c) => {
    const d = document.createElement("div");
    d.className = "thumb";
    d.innerHTML = `<img src="${c.url}" alt="" loading="lazy" />` +
      `<span class="tag">${c.ply_index}: ${c.move_label}</span>` +
      `<button class="del" title="Delete">×</button>`;
    d.querySelector("img").onclick = () => openModal(c.url);
    d.querySelector(".del").onclick = (ev) => { ev.stopPropagation(); delCapture(c.filename); };
    el.appendChild(d);
  });
}
function openModal(url) { $("modalImg").src = url; $("modal").classList.add("show"); }

/* ---------- set/board datalists (from sets.json/boards.json) ---------- */
const ADD_META = "__add_meta__";  // sentinel dropdown value -> "add a new set/board" flow
async function loadMeta() {
  try {
    const m = await fetch("/api/meta").then(j);
    fillMetaSelect("setSelect", m.sets, "cv_set", "set");
    fillMetaSelect("boardSelect", m.boards, "cv_board", "board");
  } catch { /* no metadata files -> selects stay empty, sessions just go untagged */ }
}
function fillMetaSelect(id, values, storeKey, kind, selectValue) {
  const sel = $(id);
  sel.innerHTML = "";
  values.forEach((v) => { const o = document.createElement("option"); o.value = v; o.textContent = v; sel.appendChild(o); });
  const add = document.createElement("option"); add.value = ADD_META; add.textContent = `➕ new ${kind}…`; sel.appendChild(add);
  const saved = selectValue ?? localStorage.getItem(storeKey);
  if (saved && values.includes(saved)) sel.value = saved;
  sel.onchange = () => {
    if (sel.value === ADD_META) { addMeta(id, storeKey, kind); return; }
    localStorage.setItem(storeKey, sel.value);
  };
}
// "add a new set/board": prompt for the id (+ square_mm for boards), POST it into
// sets.json/boards.json, then re-fill the dropdown and select the new entry.
async function addMeta(id, storeKey, kind) {
  const sel = $(id);
  const restore = () => { sel.value = localStorage.getItem(storeKey) || ""; };
  const hint = kind === "board" ? "named by square size, e.g. tournament-50mm" : "e.g. tournament-plastic";
  const newId = (prompt(`New ${kind} id (${hint}):`) || "").trim();
  if (!newId) { restore(); return; }
  const body = { id: newId };
  if (kind === "board") {
    const mmStr = (prompt("Square size in mm (edge of one playing square; blank if unknown):") || "").trim();
    if (mmStr) { const mm = parseFloat(mmStr); if (!isNaN(mm)) body.square_mm = mm; }
  }
  try {
    const m = await postJson(`/api/meta/${kind}`, body);
    const values = kind === "board" ? m.boards : m.sets;
    fillMetaSelect(id, values, storeKey, kind, newId);
    localStorage.setItem(storeKey, newId);
    toast(`Added ${kind} ${newId} ✓`);
  } catch (e) { restore(); toast("Add failed: " + e.message); }
}

/* ---------- wiring ---------- */
$("selectGameBtn").onclick = openGamePicker;
$("gameModal").onclick = (e) => { if (e.target.id === "gameModal") closeGamePicker(); };
$("puzzleBtn").onclick = () => nextPuzzle().catch((e) => toast(e.message));
$("finishBtn").onclick = () => finishSession().catch((e) => toast(e.message));
$("snapBtn").onclick = snap;
$("prevBtn").onclick = () => goto(state.ply_index - 1);
$("nextBtn").onclick = () => goto(state.ply_index + 1);
$("flipBtn").onclick = () => flipBoard().catch((e) => toast(e.message));
$("markBtn").onclick = enterCornerMode;
$("rotateBtn").onclick = () => rotateGrid().catch((e) => toast(e.message));
$("refreshCams").onclick = listCameras;
$("cameraSelect").onchange = (e) => onCameraChange(e.target.value).catch((err) => toast(err.message));
$("video").addEventListener("loadedmetadata", updateButtons);
$("video").addEventListener("canplay", updateButtons);
$("modalClose").onclick = () => $("modal").classList.remove("show");
$("modal").onclick = (e) => { if (e.target.id === "modal") $("modal").classList.remove("show"); };
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "SELECT") return;
  if (e.repeat || CM.active) return;  // CM handles its own keys while marking
  if ($("gameModal").classList.contains("show")) { if (e.code === "Escape") closeGamePicker(); return; }
  if (e.code === "Space" || e.code === "Enter") { e.preventDefault(); snap(); }
  else if (state && e.code === "ArrowLeft") goto(state.ply_index - 1);
  else if (state && e.code === "ArrowRight") goto(state.ply_index + 1);
});

loadMeta();
checkCornerAssist();
listCameras();
overlayLoop();
</script>
</body>
