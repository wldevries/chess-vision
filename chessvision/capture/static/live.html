<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>chessvision — live read</title>
<style>
  :root {
    --bg: #15171c; --panel: #1f232b; --line: #2c313b; --fg: #e7e9ee;
    --muted: #9aa3b2; --accent: #4f8cff; --good: #36c46b; --bad: #ff5d5d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--fg); font: 16px/1.4 system-ui, sans-serif;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  header {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    padding: 10px 14px; background: var(--panel); border-bottom: 1px solid var(--line);
  }
  header .title { font-weight: 700; letter-spacing: .3px; }
  header .spacer { flex: 1; }
  select, button {
    font: inherit; color: var(--fg); background: #262b34; border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 14px; cursor: pointer;
  }
  select { max-width: 44vw; }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--accent); border-color: var(--accent); font-weight: 700; }
  button:disabled { opacity: .4; cursor: default; }
  a.backlink { color: var(--muted); text-decoration: none; padding: 8px 10px; border-radius: 8px; }
  a.backlink:hover { background: #262b34; color: var(--fg); }
  .progress { color: var(--muted); font-variant-numeric: tabular-nums; }

  main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 14px; min-height: 0; }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
  .pane { background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
          padding: 12px; display: flex; flex-direction: column; min-height: 0; }
  .pane h2 { margin: 0 0 8px; font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }

  .camera-wrap { position: relative; flex: 1; min-height: 0; background: #000; border-radius: 10px; overflow: hidden; }
  video, .layer { position: absolute; inset: 0; width: 100%; height: 100%; }
  video { object-fit: contain; display: block; }
  .layer { pointer-events: none; }
  .cam-empty { position: absolute; inset: 0; display: grid; place-items: center; color: var(--muted); text-align: center; padding: 20px; }

  .cam-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .cam-row.grow > select { flex: 1; max-width: none; }

  .board-wrap { flex: 1; min-height: 0; display: grid; place-items: center; }
  .board-wrap svg { width: 100%; height: 100%; max-width: 70vh; }
  .read-board-empty { color: var(--muted); text-align: center; padding: 20px; }
  .instruction { font-size: 18px; margin: 10px 2px 4px; min-height: 1.4em; }
  .read-stat { font-variant-numeric: tabular-nums; }
  .board-controls { display: flex; gap: 10px; align-items: center; margin-top: 8px; flex-wrap: wrap; }

  .snapbar { display: flex; gap: 12px; align-items: center; margin-top: 12px; }
  .snap { flex: 1; font-size: 20px; padding: 18px; background: var(--good); border-color: var(--good); color: #06210f; font-weight: 800; }
  .snap:disabled { background: #2a3a30; border-color: #2a3a30; color: var(--muted); }

  .fen-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
  .fen-row input { flex: 1; min-width: 0; font: 13px/1.3 ui-monospace, monospace; color: var(--fg);
                   background: #181c22; border: 1px solid var(--line); border-radius: 8px; padding: 9px 10px;
                   user-select: text; -webkit-user-select: text; }

  .toast { position: fixed; left: 50%; bottom: 80px; transform: translateX(-50%);
           background: #000a; border: 1px solid var(--line); padding: 10px 16px; border-radius: 10px;
           opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 30; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <header>
    <span class="title">♟ Live read</span>
    <a class="backlink" href="/" title="Back to capture">← capture</a>
    <span class="spacer"></span>
    <span class="progress" id="status">—</span>
  </header>

  <main>
    <section class="pane">
      <h2>Camera</h2>
      <div class="cam-row grow">
        <select id="cameraSelect" title="Camera"></select>
        <button id="refreshCams" title="Re-detect cameras">↻</button>
      </div>
      <div class="camera-wrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlayCanvas" class="layer"></canvas>
        <div class="cam-empty" id="camEmpty">Grant camera access and pick your board-facing camera.</div>
      </div>
      <div class="snapbar">
        <button class="snap" id="readBtn" disabled>Read position 📷</button>
      </div>
    </section>

    <section class="pane">
      <h2>Predicted position</h2>
      <div class="board-wrap" id="readBoard">
        <span class="read-board-empty">Point the camera at the board and press Read.</span>
      </div>
      <div class="instruction read-stat" id="readInfo">No reading yet.</div>
      <div class="fen-row">
        <input id="fenInput" readonly placeholder="FEN appears here" />
        <button id="copyFenBtn" title="Copy FEN">Copy</button>
      </div>
      <div class="board-controls">
        <button id="readRotateBtn" title="Cycle board orientation (relabels squares, no re-read)" disabled>Rotate ⟳ · R0</button>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>
  <canvas id="canvas" hidden></canvas>

<script src="/static/cv.js"></script>
<script>
// Read-position state. There are no stored or hand-marked corners: a Read captures one
// frame and the server auto-detects the board corners *and* the pieces on it. `prediction`
// is the last /api/live/predict response; `orient` rotates the square relabelling. The
// camera + grid math come from cv.js.
let live = { prediction: null, orient: 0, available: false };

window.onCameraStarted = updateButtons;
async function onCameraChange(deviceId) {
  await startCamera(deviceId);
  live.prediction = null;  // new view: drop the old reading
  renderRead(); updateButtons();
}

/* ---------- live overlay (detected corners + grid + piece base points) ---------- */
function drawOverlay() {
  const o = overlayCtx();
  if (!o || !live.prediction) return;
  drawGrid(o.ctx, live.prediction.lattice, o.r);
  const c = live.prediction.corners;
  ["top_left", "top_right", "bottom_right", "bottom_left"].forEach((k) => {
    const [x, y] = toDisplay(c[k][0], c[k][1], o.r); drawDot(o.ctx, x, y, "#4f8cff", 7);
  });
  live.prediction.pieces.forEach((p) => { const [x, y] = toDisplay(p.point[0], p.point[1], o.r); drawDot(o.ctx, x, y, p.color, 5); });
}
function overlayLoop() { try { drawOverlay(); } catch { /* transient */ } requestAnimationFrame(overlayLoop); }

/* ---------- read position (auto corners + pieces, one frame) ---------- */
async function readPosition() {
  if (!stream) return toast("Camera not ready");
  if (!live.available) return toast("Read-position mode is off (launch with --keypoint-ckpt and --corner-ckpt)");
  $("readBtn").disabled = true;
  try {
    const blob = await captureBlob();
    const body = new FormData();
    body.append("image", blob, "frame.jpg");
    live.prediction = await fetch("/api/live/predict", { method: "POST", body }).then(j);
    renderRead();
    toast(`Read ${live.prediction.n_detected} piece(s) — rotate if the board reads wrong`);
  } catch (e) { toast("Read failed: " + e.message); }
  updateButtons();
}
function rotateRead() {
  if (!live.prediction) return;
  live.orient = (live.orient + 1) % 4;
  renderRead();
}
function renderRead() {
  const p = live.prediction, board = $("readBoard");
  if (!p) { board.innerHTML = '<span class="read-board-empty">Point the camera at the board and press Read.</span>'; return; }
  const name = ORIENTATIONS[live.orient], o = p.orientations[name];
  board.innerHTML = o.board_svg;
  $("fenInput").value = o.fen;
  $("readInfo").textContent = `${p.n_detected} detected · ${o.n_placed} placed · orientation ${name}`;
  $("readRotateBtn").textContent = `Rotate ⟳ · ${name}`;
}
async function copyFen() {
  const v = $("fenInput").value;
  if (!v) return;
  try { await navigator.clipboard.writeText(v); }
  catch { $("fenInput").select(); document.execCommand("copy"); }
  toast("FEN copied");
}

function updateButtons() {
  const camReady = !!(stream && $("video").videoWidth);
  $("readBtn").disabled = !camReady || !live.available;
  $("readRotateBtn").disabled = !live.prediction;
  $("status").textContent = !live.available ? "read-position mode off"
    : live.prediction ? `${live.prediction.n_detected} pieces · ${ORIENTATIONS[live.orient]}`
    : (camReady ? "ready — press Read" : "—");
}

/* ---------- wiring ---------- */
$("refreshCams").onclick = listCameras;
$("cameraSelect").onchange = (e) => onCameraChange(e.target.value).catch((err) => toast(err.message));
// videoWidth is 0 until the stream's metadata arrives, so re-run updateButtons on the
// video's own ready events.
$("video").addEventListener("loadedmetadata", updateButtons);
$("video").addEventListener("canplay", updateButtons);
$("readBtn").onclick = () => readPosition().catch((e) => toast(e.message));
$("readRotateBtn").onclick = rotateRead;
$("copyFenBtn").onclick = () => copyFen();
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "SELECT" || e.target.tagName === "INPUT") return;
  if (e.repeat) return;
  if (e.code === "Space" || e.code === "Enter") { e.preventDefault(); readPosition().catch((err) => toast(err.message)); }
  else if (e.code === "ArrowRight" || e.code === "ArrowLeft") rotateRead();
});

(async function init() {
  try { live.available = !!(await fetch("/api/live/available").then(j)).available; } catch { /* off */ }
  if (!live.available) toast("Read-position mode is off — launch with --keypoint-ckpt and --corner-ckpt");
  await listCameras();
  renderRead();
  updateButtons();
  overlayLoop();
})();
</script>
</body>
</html>
