<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>chessvision — live read</title>
<style>
  :root {
    --bg: #15171c; --panel: #1f232b; --line: #2c313b; --fg: #e7e9ee;
    --muted: #9aa3b2; --accent: #4f8cff; --good: #36c46b; --bad: #ff5d5d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--fg); font: 16px/1.4 system-ui, sans-serif;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  header {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    padding: 10px 14px; background: var(--panel); border-bottom: 1px solid var(--line);
  }
  header .title { font-weight: 700; letter-spacing: .3px; }
  header .spacer { flex: 1; }
  select, button {
    font: inherit; color: var(--fg); background: #262b34; border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 14px; cursor: pointer;
  }
  select { max-width: 44vw; }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--accent); border-color: var(--accent); font-weight: 700; }
  button:disabled { opacity: .4; cursor: default; }
  a.backlink { color: var(--muted); text-decoration: none; padding: 8px 10px; border-radius: 8px; }
  a.backlink:hover { background: #262b34; color: var(--fg); }
  label.chk { display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--muted); }
  label.chk input { accent-color: var(--accent); }
  .progress { color: var(--muted); font-variant-numeric: tabular-nums; }

  main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 14px; min-height: 0; }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
  .pane { background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
          padding: 12px; display: flex; flex-direction: column; min-height: 0; }
  .pane h2 { margin: 0 0 8px; font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }

  .camera-wrap { position: relative; flex: 1; min-height: 0; background: #000; border-radius: 10px; overflow: hidden; }
  video, .layer { position: absolute; inset: 0; width: 100%; height: 100%; }
  video { object-fit: contain; display: block; }
  .layer { pointer-events: none; }
  /* Heatmap overlay: the server returns a grayscale PNG; the client bakes it into an
     RGBA bitmap (alpha = intensity above floor, RGB = saturated yellow) so peaks are
     opaque and the diffuse softmax background is transparent — natural alpha
     compositing puts the blobs over the video, no CSS blend modes needed. The canvas
     stays laid out at all times; `heat.on` just gates whether drawHeat paints. */
  .cam-empty { position: absolute; inset: 0; display: grid; place-items: center; color: var(--muted); text-align: center; padding: 20px; }

  .cam-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .cam-row.grow > select { flex: 1; max-width: none; }

  .corner-modal { position: fixed; inset: 0; background: #000; display: none; z-index: 40; flex-direction: column; }
  .corner-modal.show { display: flex; }
  .corner-toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
                    padding: 10px 14px; background: var(--panel); border-bottom: 1px solid var(--line); }
  .corner-toolbar .hint { flex: 1; min-width: 200px; color: var(--fg); font-size: 14px; }
  .corner-toolbar .exit { margin-left: 22px; }
  .corner-canvas-area { flex: 1; position: relative; min-height: 0; }
  #cornerCanvas { position: absolute; inset: 0; width: 100%; height: 100%;
                  cursor: crosshair; touch-action: none; }

  .board-wrap { flex: 1; min-height: 0; display: grid; place-items: center; }
  .board-wrap svg { width: 100%; height: 100%; max-width: 70vh; }
  .read-board-empty { color: var(--muted); text-align: center; padding: 20px; }
  .instruction { font-size: 18px; margin: 10px 2px 4px; min-height: 1.4em; }
  .read-stat { font-variant-numeric: tabular-nums; }
  .board-controls { display: flex; gap: 10px; align-items: center; margin-top: 8px; flex-wrap: wrap; }

  .snapbar { display: flex; gap: 12px; align-items: center; margin-top: 12px; }
  .snap { flex: 1; font-size: 20px; padding: 18px; background: var(--good); border-color: var(--good); color: #06210f; font-weight: 800; }
  .snap:disabled { background: #2a3a30; border-color: #2a3a30; color: var(--muted); }

  .fen-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
  .fen-row input { flex: 1; min-width: 0; font: 13px/1.3 ui-monospace, monospace; color: var(--fg);
                   background: #181c22; border: 1px solid var(--line); border-radius: 8px; padding: 9px 10px;
                   user-select: text; -webkit-user-select: text; }

  .toast { position: fixed; left: 50%; bottom: 80px; transform: translateX(-50%);
           background: #000a; border: 1px solid var(--line); padding: 10px 16px; border-radius: 10px;
           opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 30; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <header>
    <span class="title">♟ Live read</span>
    <a class="backlink" href="/" title="Back to capture">← capture</a>
    <span class="spacer"></span>
    <label class="chk" id="heatLabel" hidden>
      <input type="checkbox" id="heatToggle" /> 81-point heatmap
    </label>
    <span class="progress" id="status">—</span>
  </header>

  <main>
    <section class="pane">
      <h2>Camera</h2>
      <div class="cam-row grow">
        <select id="cameraSelect" title="Camera"></select>
        <button id="refreshCams" title="Re-detect cameras">↻</button>
      </div>
      <div class="cam-row">
        <button id="markBtn" disabled>Mark corners</button>
        <span class="muted" id="cornerStatus">corners not set</span>
      </div>
      <div class="camera-wrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="heatCanvas" class="layer"></canvas>
        <canvas id="overlayCanvas" class="layer"></canvas>
        <div class="cam-empty" id="camEmpty">Grant camera access and pick your board-facing camera.</div>
      </div>
      <div class="snapbar">
        <button class="snap" id="readBtn" disabled>Read position 📷</button>
      </div>
    </section>

    <section class="pane">
      <h2>Predicted position</h2>
      <div class="board-wrap" id="readBoard">
        <span class="read-board-empty">Mark the 4 board corners, then read the position.</span>
      </div>
      <div class="instruction read-stat" id="readInfo">No reading yet.</div>
      <div class="fen-row">
        <input id="fenInput" readonly placeholder="FEN appears here" />
        <button id="copyFenBtn" title="Copy FEN">Copy</button>
      </div>
      <div class="board-controls">
        <button id="readRotateBtn" title="Cycle board orientation (relabels squares, no re-read)" disabled>Rotate ⟳ · R0</button>
      </div>
    </section>
  </main>

  <div class="corner-modal" id="cornerModal">
    <div class="corner-toolbar">
      <span class="hint" id="cornerHint">Tap the 4 board corners.</span>
      <button id="predictCorner" hidden>Predict</button>
      <button id="saveCorner" class="primary" disabled>Save</button>
      <button id="cancelCorner" class="exit">Close</button>
    </div>
    <div class="corner-canvas-area">
      <canvas id="cornerCanvas"></canvas>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <canvas id="canvas" hidden></canvas>

<script src="/static/cv.js"></script>
<script>
// Read-position state. `corners` are the 4 clicked points (sorted server-side into
// TL/TR/BR/BL); `prediction` is the last /api/live/predict response; `orient` rotates
// the relabelling. The camera, corner-marking modal (CM), and grid math come from cv.js.
let live = { corners: null, prediction: null, orient: 0 };
let heat = { available: false, on: false, tinted: null };

function liveCornerKey() { return `cv_live_corners_${currentDeviceId()}`; }
function applySavedCorners() {
  const raw = localStorage.getItem(liveCornerKey());
  if (raw) { try { live.corners = JSON.parse(raw); } catch { /* stale */ } }
}
window.onCameraStarted = updateButtons;
async function onCameraChange(deviceId) {
  CM.close();
  await startCamera(deviceId);
  // New camera = new view: drop old corners, reuse this camera's saved ones if any.
  live.corners = null; live.prediction = null; heat.tinted = null; autoPredictedOnce = false;
  applySavedCorners();
  renderRead(); updateButtons();
}

/* ---------- corner marking (opens the shared modal) ---------- */
function enterCornerMode() {
  const v = $("video");
  if (!stream || !v.videoWidth) return toast("Camera not ready");
  const frozen = document.createElement("canvas");
  frozen.width = v.videoWidth; frozen.height = v.videoHeight;
  frozen.getContext("2d").drawImage(v, 0, 0);
  CM.open(frozen, {
    initialPts: Array.isArray(live.corners) ? live.corners : [],
    onSave: async (_ordered, raw) => {
      live.corners = raw;  // server sorts into TL/TR/BR/BL on predict
      localStorage.setItem(liveCornerKey(), JSON.stringify(live.corners));
      CM.close();
      await readPosition();
    },
  });
}

/* ---------- corner-assist: probe + one-shot auto-predict from the live frame ---------- */
async function checkCornerAssist() {
  const info = await CM.checkAssist();
  heat.available = !!info.heatmap;
  $("heatLabel").hidden = !heat.available;
}
// When the camera is ready and no corners are saved yet, run the regressor on the
// current frame and seed `live.corners` so the page lands "ready to Read".
let autoPredictedOnce = false;
async function autoPredictCorners() {
  if (autoPredictedOnce || !CM.predictAvailable) return;
  if (!stream || !$("video").videoWidth) return;
  autoPredictedOnce = true;
  try {
    const blob = await captureBlob();
    const body = new FormData();
    body.append("image", blob, "frame.jpg");
    const { corners: c } = await fetch("/api/corners/predict", { method: "POST", body }).then(j);
    live.corners = [c.top_left, c.top_right, c.bottom_right, c.bottom_left];
    localStorage.setItem(liveCornerKey(), JSON.stringify(live.corners));
    toast("Corners predicted — press Read or Mark to adjust");
    updateButtons();
  } catch (e) {
    autoPredictedOnce = false;  // let the user retry by reloading / changing camera
    toast("Auto-predict failed: " + e.message);
  }
}

/* ---------- live overlay (grid + piece base points) ---------- */
function drawOverlay() {
  const o = overlayCtx();
  if (!o || !live.prediction) return;
  drawGrid(o.ctx, live.prediction.lattice, o.r);
  live.prediction.pieces.forEach((p) => { const [x, y] = toDisplay(p.point[0], p.point[1], o.r); drawDot(o.ctx, x, y, p.color, 5); });
}
function overlayLoop() { try { drawOverlay(); drawHeat(); } catch { /* transient */ } requestAnimationFrame(overlayLoop); }

/* ---------- additive heatmap overlay ---------- */
// `heat.tinted` is the heatmap pre-baked into RGBA (alpha=intensity, RGB=accent tint),
// so drawHeat just stretches it onto the canvas and natural alpha compositing puts the
// peaks over the video with the dark floor staying invisible — no CSS blend modes.
function drawHeat() {
  const c = $("heatCanvas"), v = $("video");
  c.width = c.clientWidth; c.height = c.clientHeight;
  if (CM.active || !heat.on || !heat.tinted || !v.videoWidth) return;
  const r = containRect(v.videoWidth, v.videoHeight, c.width, c.height);
  const ctx = c.getContext("2d");
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";  // smooth peaks into visible blobs, not single px
  ctx.drawImage(heat.tinted, r.offx, r.offy, v.videoWidth * r.scale, v.videoHeight * r.scale);
}
// Pull the latest heatmap PNG and bake it into a tinted RGBA canvas: peaks become
// opaque yellow, the diffuse softmax floor goes transparent. Done once per refresh.
async function refreshHeatmap() {
  if (!heat.available || !heat.on) return;
  try {
    const blob = await captureBlob();
    const body = new FormData();
    body.append("image", blob, "frame.jpg");
    const r = await fetch("/api/corners/heatmap", { method: "POST", body });
    if (!r.ok) throw new Error((await r.json()).error || r.statusText);
    const bmp = await createImageBitmap(await r.blob());
    const off = document.createElement("canvas");
    off.width = bmp.width; off.height = bmp.height;
    const octx = off.getContext("2d");
    octx.drawImage(bmp, 0, 0);
    const id = octx.getImageData(0, 0, bmp.width, bmp.height);
    // Histogram floor: drop the bottom 25% so the diffuse softmax background goes fully
    // transparent; rescale the remainder so peaks still hit alpha=255.
    const vals = [];
    for (let i = 0; i < id.data.length; i += 4) vals.push(id.data[i]);
    vals.sort((a, b) => a - b);
    const floor = vals[Math.floor(vals.length * 0.25)];
    const span = Math.max(1, 255 - floor);
    for (let i = 0; i < id.data.length; i += 4) {
      const g = id.data[i];
      id.data[i] = 0xff; id.data[i + 1] = 0xd6; id.data[i + 2] = 0x2a;  // saturated yellow
      id.data[i + 3] = Math.max(0, Math.min(255, ((g - floor) / span) * 255));
    }
    octx.putImageData(id, 0, 0);
    heat.tinted = off;
  } catch (e) { toast("Heatmap failed: " + e.message); }
}
async function onHeatToggle() {
  heat.on = $("heatToggle").checked;
  if (!heat.on) { const c = $("heatCanvas"); c.width = c.width; return; }  // clear immediately
  if (!heat.tinted) await refreshHeatmap();
}

/* ---------- read position (live FEN) ---------- */
async function readPosition() {
  if (!stream) return toast("Camera not ready");
  if (!live.corners) return toast("Mark the board corners first");
  $("readBtn").disabled = true;
  try {
    const blob = await captureBlob();
    const body = new FormData();
    body.append("image", blob, "frame.jpg");
    body.append("corners", JSON.stringify(live.corners));
    live.prediction = await fetch("/api/live/predict", { method: "POST", body }).then(j);
    renderRead();
    toast(`Read ${live.prediction.n_detected} piece(s) — rotate if the board reads wrong`);
    if (heat.on) refreshHeatmap();  // a read is also a fresh frame
  } catch (e) { toast("Read failed: " + e.message); }
  updateButtons();
}
function rotateRead() {
  if (!live.prediction) return;
  live.orient = (live.orient + 1) % 4;
  renderRead();
}
function renderRead() {
  const p = live.prediction, board = $("readBoard");
  if (!p) { board.innerHTML = '<span class="read-board-empty">Mark the 4 board corners, then read the position.</span>'; return; }
  const name = ORIENTATIONS[live.orient], o = p.orientations[name];
  board.innerHTML = o.board_svg;
  $("fenInput").value = o.fen;
  $("readInfo").textContent = `${p.n_detected} detected · ${o.n_placed} placed · orientation ${name}`;
  $("readRotateBtn").textContent = `Rotate ⟳ · ${name}`;
}
async function copyFen() {
  const v = $("fenInput").value;
  if (!v) return;
  try { await navigator.clipboard.writeText(v); }
  catch { $("fenInput").select(); document.execCommand("copy"); }
  toast("FEN copied");
}

function updateButtons() {
  const camReady = !!(stream && $("video").videoWidth);
  $("readBtn").disabled = !camReady || CM.active || !live.corners;
  $("markBtn").disabled = !camReady;
  $("markBtn").textContent = live.corners ? "Redo corners" : "Mark corners";
  $("readRotateBtn").disabled = !live.prediction;
  $("cornerStatus").textContent = !camReady ? "camera not ready"
    : !live.corners ? "corners not set"
    : live.prediction ? "corners set" : "saved corners — press Read";
  $("status").textContent = live.prediction
    ? `${live.prediction.n_detected} pieces · ${ORIENTATIONS[live.orient]}`
    : (live.corners ? "ready" : "—");
}

/* ---------- wiring ---------- */
$("refreshCams").onclick = listCameras;
$("cameraSelect").onchange = (e) => onCameraChange(e.target.value).catch((err) => toast(err.message));
// videoWidth is 0 until the stream's metadata arrives, so re-run updateButtons on the
// video's own ready events. Auto-predict needs a real frame, so wait for canplay.
$("video").addEventListener("loadedmetadata", updateButtons);
$("video").addEventListener("canplay", () => {
  updateButtons();
  if (!live.corners) autoPredictCorners().catch((e) => toast(e.message));
});
$("markBtn").onclick = enterCornerMode;
$("readBtn").onclick = () => readPosition().catch((e) => toast(e.message));
$("readRotateBtn").onclick = rotateRead;
$("copyFenBtn").onclick = () => copyFen();
$("heatToggle").onchange = () => onHeatToggle().catch((e) => toast(e.message));
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "SELECT" || e.target.tagName === "INPUT") return;
  if (e.repeat || CM.active) return;  // CM handles its own keys
  if (e.code === "Space" || e.code === "Enter") { e.preventDefault(); readPosition().catch((err) => toast(err.message)); }
  else if (e.code === "ArrowRight" || e.code === "ArrowLeft") rotateRead();
});

(async function init() {
  applySavedCorners();
  await checkCornerAssist();
  await listCameras();
  renderRead();
  updateButtons();
  overlayLoop();
})();
</script>
</body>
</html>
